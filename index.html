    const blob = new Blob([JSON.stringify(manifest)], {type:'application/json'});

function getGarde(region, type, millesime) {
  const r = GARDE[region] || GARDE["Autre"];
  const key = type==="Rouge"?"rouge":type==="Effervescent"?(r.effervescent?"effervescent":"blanc"):"blanc";
  const [min,peak,max] = r[key]||[2,5,10];
  if (!millesime) return {min,peak,max,statut:"?"};
  const age = new Date().getFullYear()-millesime;
  const statut = age<min?"jeune":age<=peak?"pret":age<=max?"apogee":"declin";
  return {min,peak,max,age,statut};
}

function getAccord(region,type){
  const key=`${region}-${type}`;
  const a=ACCORDS[key]||ACCORDS[`${region}-Rouge`];
  return a?a.txt:"Plats de caractère, fromages affinés, charcuterie fine";
}
function getPlats(region,type){
  const key=`${region}-${type}`;
  const a=ACCORDS[key]||ACCORDS[`${region}-Rouge`];
  return a?a.plats:[];
}

const uid = () => Math.random().toString(36).slice(2)+Date.now();
const STORE = "cave_v18";
function loadState(){
  try{
    const s=localStorage.getItem(STORE);
    if(s) return JSON.parse(s);
    // Migration v17 → v18 : rack unique → racks[]
    const old=localStorage.getItem("cave_v17");
    if(old){
      const d=JSON.parse(old);
      return {
        ...d,
        groupes: d.groupes.map(g=>{
          if(g.rack){
            const rackId=uid();
            return {
              ...g,
              racks:[{id:rackId, nom:"Rack 1", rangees:g.rack.rangees, colonnes:g.rack.colonnes, storageType:g.storageType||"rack"}],
              rack:undefined, storageType:undefined,
            };
          }
          return {...g, racks:g.racks||[], rack:undefined};
        }),
        bouteilles: d.bouteilles.map(b=>({...b, rackId: b.rackSlots?.length ? (d.groupes.find(g=>g.id===b.groupeId)?.rack ? "migrated" : "") : ""})),
      };
    }
  }catch{}
  return {
    groupes:[
      {id:uid(), nom:"Cave principale", racks:[]},
      {id:uid(), nom:"Cellier",         racks:[]},
    ],
    bouteilles:[],
    regions: REGIONS_DEFAULT,
    historique:[],
  };
}

// ── Page Vue d'ensemble du rack ───────────────────────────────────────────────
function PageRackVue({groupes, bouteilles, onVinClick, onBack}){
  const groupesAvecRacks = groupes.filter(g=>g.racks?.length>0);
  const [groupeActif, setGroupeActif] = useState(groupesAvecRacks[0]?.id||groupes[0]?.id||"");
  const [selectedSlot, setSelectedSlot] = useState(null); // "rackId:slot"
  const [hoverSlot, setHoverSlot] = useState(null);

  const grp = groupes.find(g=>g.id===groupeActif);
  const racks = grp?.racks||[];
  const btlsGroupe = bouteilles.filter(b=>b.groupeId===groupeActif);

  // Map slot -> bouteille pour chaque rack : "rackId:slot" -> bouteille
  // Robuste : si rackId manque, on mappe sur tous les racks du groupe
  const slotMap = {};
  btlsGroupe.forEach(b=>{
    const slots = Array.isArray(b.rackSlots)?b.rackSlots:(b.rackSlot?[b.rackSlot]:[]);
    if(!slots.length) return;
    // Si rackId défini, on l'utilise directement
    if(b.rackId) {
      slots.forEach(s=>{ slotMap[`${b.rackId}:${s}`] = b; });
    } else {
      // Sinon on mappe sur le premier rack du groupe (rétrocompat)
      const firstRack = racks[0];
      if(firstRack) slots.forEach(s=>{ slotMap[`${firstRack.id}:${s}`] = b; });
    }
  });

  const totalSlots = racks.reduce((s,r)=>s+r.rangees*r.colonnes, 0);
  const occupes    = Object.keys(slotMap).length;
  const vinDuSlot  = selectedSlot ? slotMap[selectedSlot] : null;

  // SVG interactif pour un rack
  function RackInteractif({rack}){
    const {rangees,colonnes,storageType,id:rackId} = rack;
    const ROWS = Array.from({length:rangees},(_,i)=>String.fromCharCode(65+i));
    const COLS = Array.from({length:colonnes},(_,i)=>i+1);
    const maxW = 340;
    const cellW = Math.min(40,(maxW-34)/colonnes);
    const cellH = Math.min(38,cellW*0.92);
    const W = cellW*colonnes+34, H = cellH*rangees+30;
    const PAD = {top:22,left:26,right:8,bottom:8};
    const R = Math.min(cellW,cellH)*0.30;
    const isFrigo = storageType==="frigo";

    return (
      <svg width={W} height={H} style={{display:"block",userSelect:"none",overflow:"visible"}}>
        <rect x={PAD.left} y={PAD.top} width={W-PAD.left-PAD.right} height={H-PAD.top-PAD.bottom}
          fill={isFrigo?"#1e2428":"#1c1c0e"} rx={5} stroke={isFrigo?"#3a4a54":"#3a3a20"} strokeWidth={1}/>
        {isFrigo&&<text x={PAD.left-2} y={PAD.top-14} fontSize={11} fill="#4a8fbf" fontFamily="DM Sans,sans-serif" opacity={0.7}>❄</text>}
        {ROWS.map((r,ri)=>{
          const y=PAD.top+(ri+0.5)*cellH;
          return <g key={r}>
            <line x1={PAD.left} y1={y} x2={W-PAD.right} y2={y} stroke={isFrigo?"#3a4a54":"#5a5a30"} strokeWidth={1.5}/>
            <text x={PAD.left-8} y={y+4} textAnchor="middle" fontSize={8} fill="#5a5a40" fontFamily="DM Sans,sans-serif">{r}</text>
            {COLS.slice(0,-1).map((_,ci)=>{
              const x1=PAD.left+(ci+0.5)*cellW,x2=PAD.left+(ci+1.5)*cellW;
              const yT=PAD.top+ri*cellH+3,yB=PAD.top+(ri+1)*cellH-3;
              return <g key={ci}><line x1={x1} y1={yT} x2={x2} y2={yB} stroke="#3a3a18" strokeWidth={1} opacity={0.5}/><line x1={x2} y1={yT} x2={x1} y2={yB} stroke="#3a3a18" strokeWidth={1} opacity={0.5}/></g>;
            })}
          </g>;
        })}
        <rect x={PAD.left-4} y={PAD.top-3} width={5} height={H-PAD.top-PAD.bottom+6} fill={isFrigo?"#4a5a64":"#6a6a3a"} rx={2}/>
        <rect x={W-PAD.right-1} y={PAD.top-3} width={5} height={H-PAD.top-PAD.bottom+6} fill={isFrigo?"#4a5a64":"#6a6a3a"} rx={2}/>
        {COLS.map((c,ci)=><text key={c} x={PAD.left+(ci+0.5)*cellW} y={PAD.top-8} textAnchor="middle" fontSize={8} fill="#5a5a40" fontFamily="DM Sans,sans-serif">{c}</text>)}

        {ROWS.map((r,ri)=>COLS.map((c,ci)=>{
          const slot=`${r}${c}`;
          const key=`${rackId}:${slot}`;
          const cx=PAD.left+(ci+0.5)*cellW, cy=PAD.top+(ri+0.5)*cellH;
          const vin=slotMap[key];
          const isSelected=selectedSlot===key;
          const isHover=hoverSlot===key;
          return (
            <g key={slot}
              onClick={()=>{ if(vin) setSelectedSlot(s=>s===key?null:key); }}
              onMouseEnter={()=>vin&&setHoverSlot(key)}
              onMouseLeave={()=>setHoverSlot(null)}
              style={{cursor:vin?"pointer":"default"}}>
              {vin&&<>
                <circle cx={cx} cy={cy} r={R+(isHover||isSelected?3:0)}
                  fill={TYPE_COLOR[vin.type]||"#888"} opacity={0.75}
                  style={{transition:"r 0.12s"}}/>
                {isSelected&&<circle cx={cx} cy={cy} r={R+6} fill="none" stroke={TYPE_COLOR[vin.type]} strokeWidth={1.5} opacity={0.8}/>}
              </>}
              {!vin&&isHover&&<circle cx={cx} cy={cy} r={R} fill="#ffffff08"/>}
            </g>
          );
        }))}
      </svg>
    );
  }

  return (
    <div style={{paddingBottom:90}}>
      <div style={{padding:"16px 16px 14px",display:"flex",alignItems:"center",gap:12}}>
        <button onClick={onBack} style={{width:36,height:36,borderRadius:10,background:C.card,border:`1px solid ${C.border}`,color:C.text,cursor:"pointer",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>←</button>
        <div>
          <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:22,color:C.text,margin:0,fontWeight:700}}>Vue des racks</h1>
          <div style={{fontSize:12,color:C.sub,fontFamily:"'DM Sans',sans-serif"}}>{occupes}/{totalSlots} emplacements occupés</div>
        </div>
      </div>

      <div style={{padding:"0 16px"}}>
        {/* Sélecteur de lieu */}
        {groupesAvecRacks.length>1&&(
          <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
            {groupesAvecRacks.map(g=>(
              <button key={g.id} onClick={()=>{setGroupeActif(g.id);setSelectedSlot(null);}} style={{
                padding:"7px 14px",borderRadius:10,fontSize:13,fontWeight:600,
                border:`1px solid ${groupeActif===g.id?"#f39c12":C.border}`,
                background:groupeActif===g.id?"#f39c1222":C.card2,
                color:groupeActif===g.id?"#f39c12":C.sub,
                cursor:"pointer",fontFamily:"'DM Sans',sans-serif",
              }}>🗄 {g.nom} <span style={{fontSize:10,opacity:0.6}}>({g.racks.length})</span></button>
            ))}
          </div>
        )}

        {racks.length===0?(
          <div style={{textAlign:"center",padding:"40px 0",color:C.sub2}}>
            <div style={{fontSize:36,marginBottom:10}}>🗄</div>
            <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:14}}>Aucun rack configuré pour ce lieu</div>
          </div>
        ):(
          <>
            {/* Fiche vin sélectionné */}
            {vinDuSlot&&(
              <div style={{background:C.card,borderRadius:14,padding:"14px 16px",border:`1px solid ${TYPE_COLOR[vinDuSlot.type]}44`,marginBottom:14,cursor:"pointer"}}
                onClick={()=>onVinClick(vinDuSlot)}>
                <div style={{display:"flex",alignItems:"center",gap:12}}>
                  <div style={{width:40,height:40,borderRadius:10,background:TYPE_COLOR[vinDuSlot.type]+"22",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                    <Dot type={vinDuSlot.type} size={16}/>
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:15,fontWeight:700,color:C.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{vinDuSlot.nom}</div>
                    <div style={{fontSize:12,color:C.sub}}>{vinDuSlot.millesime&&`${vinDuSlot.millesime} · `}{vinDuSlot.region} · Case {selectedSlot?.split(":")[1]}</div>
                  </div>
                  <button onClick={e=>{e.stopPropagation();setSelectedSlot(null);}} style={{background:C.card2,border:"none",borderRadius:8,width:28,height:28,color:C.sub,cursor:"pointer",fontSize:14}}>✕</button>
                  <span style={{color:C.sub2,fontSize:18}}>›</span>
                </div>
              </div>
            )}

            {!vinDuSlot&&(
              <div style={{fontSize:12,color:C.sub2,fontFamily:"'DM Sans',sans-serif",textAlign:"center",padding:"6px 0 12px"}}>
                Cliquez sur une bouteille colorée pour voir sa fiche
              </div>
            )}

            {/* Tous les racks du lieu */}
            {racks.map((rack,i)=>{
              const rackBtls = btlsGroupe.filter(b=>b.rackId===rack.id);
              const rackOccupes = rackBtls.reduce((s,b)=>{
                const slots=Array.isArray(b.rackSlots)?b.rackSlots:(b.rackSlot?[b.rackSlot]:[]);
                return s+slots.length;
              },0);
              const accent = rack.storageType==="frigo"?"#4a8fbf":"#f39c12";
              return (
                <div key={rack.id} style={{background:C.card,borderRadius:14,padding:14,marginBottom:14,border:`1px solid ${C.border}`}}>
                  {/* En-tête rack */}
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <span style={{fontSize:18}}>{rack.storageType==="frigo"?"❄":"🗄"}</span>
                      <div>
                        <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:14,fontWeight:700,color:C.text}}>{rack.nom}</div>
                        <div style={{fontSize:11,color:C.sub}}>{rack.rangees}×{rack.colonnes} · {rackOccupes}/{rack.rangees*rack.colonnes} occupés</div>
                      </div>
                    </div>
                    <div style={{display:"flex",gap:6,flexWrap:"wrap",justifyContent:"flex-end"}}>
                      {TYPES.map(t=>{
                        const n=rackBtls.filter(b=>b.type===t).reduce((s,b)=>s+b.quantite,0);
                        if(!n) return null;
                        return <div key={t} style={{display:"flex",alignItems:"center",gap:3}}>
                          <div style={{width:7,height:7,borderRadius:"50%",background:TYPE_COLOR[t]}}/>
                          <span style={{fontSize:10,color:C.sub,fontFamily:"'DM Sans',sans-serif"}}>{n}</span>
                        </div>;
                      })}
                    </div>
                  </div>
                  {/* SVG rack */}
                  <div style={{overflowX:"auto"}}>
                    <RackInteractif rack={rack}/>
                  </div>
                </div>
              );
            })}
          </>
        )}
      </div>
    </div>
  );
}

// ── Page Suggestions "Ce soir" ────────────────────────────────────────────────
function PageSuggestions({bouteilles, onVinClick, onBack}){
  const [selectedPlats, setSelectedPlats] = useState([]);

  const togglePlat = p => setSelectedPlats(prev=>prev.includes(p)?prev.filter(x=>x!==p):[...prev,p]);

  const suggestions = selectedPlats.length===0 ? [] : bouteilles
    .filter(b=>b.quantite>0)
    .map(b=>{
      const g=getGarde(b.region,b.type,b.millesime);
      const plats=getPlats(b.region,b.type);
      const score = selectedPlats.filter(p=>plats.some(pl=>pl.toLowerCase().includes(p.toLowerCase())||p.toLowerCase().includes(pl.toLowerCase()))).length;
      const bonusStatut = g.statut==="apogee"?2:g.statut==="pret"?1:g.statut==="jeune"?-1:0;
      return {...b, score:score+bonusStatut, statut:g.statut};
    })
    .filter(b=>b.score>0)
    .sort((a,b)=>b.score-a.score)
    .slice(0,8);

  const statMap={jeune:{l:"Trop jeune",c:"#2980b9"},pret:{l:"Bientôt prêt",c:"#f39c12"},apogee:{l:"Apogée ✨",c:"#27ae60"},declin:{l:"En déclin",c:"#7f8c8d"},"?":{l:"—",c:"#555"}};

  return (
    <div style={{paddingBottom:90}}>
      <div style={{padding:"16px 16px 14px",display:"flex",alignItems:"center",gap:12}}>
        <button onClick={onBack} style={{width:36,height:36,borderRadius:10,background:C.card,border:`1px solid ${C.border}`,color:C.text,cursor:"pointer",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>←</button>
        <div>
          <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:22,color:C.text,margin:0,fontWeight:700}}>Ce soir</h1>
          <div style={{fontSize:12,color:C.sub,fontFamily:"'DM Sans',sans-serif"}}>Quel plat servez-vous ?</div>
        </div>
      </div>

      <div style={{padding:"0 16px"}}>
        {/* Sélection des plats */}
        <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:20}}>
          {PLATS_DISPONIBLES.map(p=>(
            <button key={p} onClick={()=>togglePlat(p)} style={{
              padding:"7px 14px",borderRadius:20,fontSize:13,fontWeight:selectedPlats.includes(p)?700:400,
              border:`1px solid ${selectedPlats.includes(p)?"#27ae60":C.border}`,
              background:selectedPlats.includes(p)?"#27ae6022":C.card2,
              color:selectedPlats.includes(p)?"#27ae60":C.sub,
              cursor:"pointer",fontFamily:"'DM Sans',sans-serif",transition:"all 0.15s",
            }}>{p}</button>
          ))}
        </div>

        {selectedPlats.length>0&&suggestions.length===0&&(
          <div style={{textAlign:"center",padding:"40px 0",color:C.sub2}}>
            <div style={{fontSize:36,marginBottom:10}}>🤔</div>
            <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:14}}>Aucun vin en stock ne correspond parfaitement</div>
          </div>
        )}

        {suggestions.length>0&&(
          <>
            <div style={{fontSize:11,color:C.sub,letterSpacing:1.2,textTransform:"uppercase",fontFamily:"'DM Sans',sans-serif",marginBottom:12,fontWeight:600}}>
              {suggestions.length} suggestion{suggestions.length>1?"s":" "} · triées par accord
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {suggestions.map((b,i)=>{
                const st=statMap[b.statut]||statMap["?"];
                return (
                  <div key={b.id} onClick={()=>onVinClick(b)} style={{
                    background:C.card,borderRadius:14,padding:"14px 16px",cursor:"pointer",
                    display:"flex",alignItems:"center",gap:12,
                    border:`1px solid ${i===0?"#27ae6044":C.border}`,
                    transition:"all 0.15s",
                  }}
                    onMouseEnter={e=>e.currentTarget.style.background=C.card2}
                    onMouseLeave={e=>e.currentTarget.style.background=C.card}>
                    {i===0&&<div style={{position:"absolute",top:0,left:0}}/>}
                    <div style={{width:38,height:38,borderRadius:10,background:TYPE_COLOR[b.type]+"22",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,position:"relative"}}>
                      <Dot type={b.type} size={14}/>
                      {i===0&&<div style={{position:"absolute",top:-4,right:-4,width:14,height:14,borderRadius:"50%",background:"#27ae60",display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,color:"#fff",fontWeight:700}}>★</div>}
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:14,fontWeight:700,color:C.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
                        {b.nom}{b.millesime&&<span style={{color:C.sub,fontWeight:400,fontSize:13,marginLeft:6}}>{b.millesime}</span>}
                      </div>
                      <div style={{fontSize:11,color:C.sub}}>{b.region} · {b.type}</div>
                      <div style={{fontSize:11,color:st.c,marginTop:2}}>{st.l}</div>
                    </div>
                    <div style={{textAlign:"right",flexShrink:0}}>
                      <div style={{fontSize:13,fontWeight:700,color:"#27ae60",fontFamily:"'DM Sans',sans-serif"}}>{b.quantite} btl</div>
                      <div style={{fontSize:10,color:C.sub2}}>accord {b.score>3?"⭐⭐⭐":b.score>1?"⭐⭐":"⭐"}</div>
                    </div>
                  </div>
                );
              })}
            </div>
          </>
        )}

        {selectedPlats.length===0&&(
          <div style={{textAlign:"center",padding:"40px 0",color:C.sub2}}>
            <div style={{fontSize:48,marginBottom:14}}>🍽</div>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,color:C.sub,marginBottom:8}}>Sélectionnez votre plat</div>
            <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:13}}>L'appli trouvera les vins qui s'accordent dans votre cave</div>
          </div>
        )}
      </div>
    </div>
  );
}

function CarteFrance({byRegion, maxQte, onRegionClick, regionActive}){
  const [hovered, setHovered] = useState(null);

  const getR = id => {
    const q=byRegion[id]||0; if(!q) return 0;
    return Math.max(8,Math.round(8+22*Math.sqrt(q/Math.max(maxQte,1))));
  };
  const getCol = id => {
    const q=byRegion[id]||0; if(!q) return "transparent";
    const isA=regionActive===id, isH=hovered===id;
    if(isA) return "#e74c3c"; if(isH) return "#d4a843";
    const t=Math.min(1,0.2+0.8*(q/Math.max(maxQte,1)));
    return `rgb(${Math.round(95+110*t)},${Math.round(18+5*(1-t))},${Math.round(18+5*(1-t))})`;
  };

  return (
    <div style={{position:"relative",userSelect:"none"}}>
      <svg viewBox="0 0 500 520"
        style={{width:"100%",maxWidth:360,display:"block",margin:"0 auto"}}
        preserveAspectRatio="xMidYMid meet">
        <defs>
          <filter id="bGlo"><feGaussianBlur stdDeviation="3" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
          <filter id="mSha"><feDropShadow dx="0" dy="2" stdDeviation="5" floodColor="#000" floodOpacity="0.5"/></filter>
          <radialGradient id="seaB" cx="45%" cy="38%">
            <stop offset="0%" stopColor="#0f1e32"/><stop offset="100%" stopColor="#070c18"/>
          </radialGradient>
        </defs>

        {/* Fond océan */}
        <rect width={500} height={520} fill="url(#seaB)" rx={10}/>

        {/* France continentale — contour extrait de la carte de référence */}
        <path d={FRANCE_PATH}
          fill="#1c1e14" stroke="#42452e"
          strokeWidth={1.2} strokeLinejoin="round" strokeLinecap="round"
          filter="url(#mSha)"/>

        {/* Corse */}
        <path d={CORSE_PATH}
          fill="#1c1e14" stroke="#42452e"
          strokeWidth={1} strokeLinejoin="round" strokeLinecap="round"/>

        {/* Bulles régions viticoles */}
        {BULLES_VITI.map(z=>{
          const q=byRegion[z.id]||0, r=getR(z.id), col=getCol(z.id);
          const isH=hovered===z.id, isA=regionActive===z.id, dim=!!(regionActive&&!isA);
          return (
            <g key={z.id} onClick={()=>onRegionClick(z.id)}
              onMouseEnter={()=>setHovered(z.id)} onMouseLeave={()=>setHovered(null)}
              style={{cursor:q>0?"pointer":"default"}}>
              {!q&&<circle cx={z.cx} cy={z.cy} r={3} fill="none" stroke="#404030" strokeWidth={0.7} opacity={0.4}/>}
              {isA&&q>0&&<circle cx={z.cx} cy={z.cy} r={r+8} fill="none" stroke="#e74c3c" strokeWidth={1.5} opacity={0.28}/>}
              {q>0&&<>
                <circle cx={z.cx} cy={z.cy} r={r} fill={col} opacity={dim?0.22:0.90}
                  filter={(isA||isH)?"url(#bGlo)":undefined}/>
                <circle cx={z.cx-r*0.28} cy={z.cy-r*0.28} r={r*0.22} fill="#fff" opacity={dim?0.02:0.15}/>
              </>}
              {q>0&&r>=10&&<text x={z.cx} y={z.cy+3.5} textAnchor="middle"
                fontSize={r>=16?9.5:8} fill="#fff" fontFamily="DM Sans,sans-serif" fontWeight="700"
                opacity={dim?0.22:0.94} style={{pointerEvents:"none"}}>{q}</text>}
              <text x={z.cx} y={z.cy+(q>0?r+11:13)} textAnchor="middle" fontSize={q>0?8:7}
                fill={q>0?(isA?"#ffd080":isH?"#e8c060":"#cdb880"):"#3a3a28"}
                fontFamily="DM Sans,sans-serif" fontWeight={q>0?"700":"400"}
                opacity={dim?0.22:0.90} style={{pointerEvents:"none"}}>{z.label}</text>
              {isH&&q>0&&<g style={{pointerEvents:"none"}}>
                <rect x={Math.min(Math.max(z.cx-54,4),394)} y={z.cy-r-42}
                  width={108} height={32} rx={6} fill="#12121e" stroke="#c0392b" strokeWidth={1} opacity={0.97}/>
                <text x={Math.min(Math.max(z.cx,58),448)} y={z.cy-r-25}
                  textAnchor="middle" fontSize={11} fill="#f0f0f8"
                  fontFamily="DM Sans,sans-serif" fontWeight="700">{z.label}</text>
                <text x={Math.min(Math.max(z.cx,58),448)} y={z.cy-r-11}
                  textAnchor="middle" fontSize={9} fill="#c0392b" fontFamily="DM Sans,sans-serif">
                  {q} bouteille{q>1?"s":""}
                </text>
              </g>}
            </g>
          );
        })}

        {regionActive&&(byRegion[regionActive]||0)>0&&<g style={{pointerEvents:"none"}}>
          <rect x={3} y={3} width={162} height={22} rx={5} fill="#c0392b18" stroke="#c0392b55" strokeWidth={1}/>
          <text x={84} y={17} textAnchor="middle" fontSize={10}
            fill="#e74c3c" fontFamily="DM Sans,sans-serif" fontWeight="700">
            ✓ {regionActive} — {byRegion[regionActive]} btl
          </text>
        </g>}
      </svg>

      {maxQte>0&&<div style={{display:"flex",alignItems:"flex-end",justifyContent:"center",gap:20,marginTop:10}}>
        {[0.25,0.6,1.0].map((t,i)=>{
          const r=Math.max(8,Math.round(8+22*Math.sqrt(t)));
          const q=Math.round(maxQte*t);
          const col=`rgb(${Math.round(95+110*t)},18,18)`;
          return <div key={i} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
            <svg width={r*2+4} height={r*2+4} style={{overflow:"visible"}}>
              <circle cx={r+2} cy={r+2} r={r} fill={col} opacity={0.88}/>
              {r>=10&&<text x={r+2} y={r+6} textAnchor="middle" fontSize={8}
                fill="#fff" fontFamily="DM Sans,sans-serif" fontWeight="700">{q}</text>}
            </svg>
            <span style={{fontSize:9,color:C.sub2,fontFamily:"'DM Sans',sans-serif"}}>{q} btl</span>
          </div>;
        })}
      </div>}
    </div>
  );
}

// ── Donut chart SVG ───────────────────────────────────────────────────────────
function DonutChart({data,size=120}){
  const total=data.reduce((s,d)=>s+d.v,0);
  if(!total) return <div style={{width:size,height:size,borderRadius:"50%",background:C.card2}}/>;
  let angle=-Math.PI/2;
  const r=size/2-10, cx=size/2, cy=size/2;
  const slices=data.map(d=>{
    const a=(d.v/total)*2*Math.PI;
    const x1=cx+r*Math.cos(angle), y1=cy+r*Math.sin(angle);
    angle+=a;
    const x2=cx+r*Math.cos(angle), y2=cy+r*Math.sin(angle);
    const large=a>Math.PI?1:0;
    const path=`M${cx},${cy} L${x1},${y1} A${r},${r},0,${large},1,${x2},${y2} Z`;
    return {path,color:d.color};
  });
  return (
    <svg width={size} height={size}>
      {slices.map((s,i)=><path key={i} d={s.path} fill={s.color} opacity={0.85}/>)}
      <circle cx={cx} cy={cy} r={r*0.55} fill={C.card}/>
    </svg>
  );
}

// ── Mini line chart SVG ────────────────────────────────────────────────────────
function LineChart({data,width=280,height=80,color="#c0392b"}){
  if(!data||data.length<2) return null;
  const min=Math.min(...data), max=Math.max(...data);
  const range=max-min||1;
  const pts=data.map((v,i)=>{
    const x=8+(i/(data.length-1))*(width-16);
    const y=height-8-((v-min)/range)*(height-16);
    return `${x},${y}`;
  });
  const area=`M${pts[0]} L${pts.join(" L")} L${8+(data.length-1)/(data.length-1)*(width-16)},${height} L8,${height} Z`;
  return (
    <svg width={width} height={height} style={{overflow:"visible"}}>
      <defs>
        <linearGradient id="lg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.3"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <path d={area} fill="url(#lg)"/>
      <polyline points={pts.join(" ")} fill="none" stroke={color} strokeWidth={2} strokeLinecap="round" strokeLinejoin="round"/>
      {pts.map((p,i)=>{
        const [x,y]=p.split(",");
        return i===pts.length-1?<circle key={i} cx={x} cy={y} r={4} fill={color} stroke="#0f0f14" strokeWidth={2}/>:null;
      })}
    </svg>
  );
}

// highlightSlots : string[] — liste des cases à mettre en valeur
function RackSVG({rangees, colonnes, highlightSlots=[], occupiedSlots=[], selectableSlots=null, onSelect, mode="view", maxW=320}){
  const ROWS = Array.from({length:rangees}, (_,i) => String.fromCharCode(65+i));
  const COLS = Array.from({length:colonnes}, (_,i) => i+1);
  const cellW = Math.min(40, (maxW - 34) / colonnes);
  const cellH = Math.min(38, cellW * 0.92);
  const W = cellW * colonnes + 34;
  const H = cellH * rangees + 30;
  const PAD = {top:22, left:26, right:8, bottom:8};
  const R = Math.min(cellW, cellH) * 0.30;

  return (
    <svg width={W} height={H} style={{display:"block", userSelect:"none", overflow:"visible"}}>
      <defs>
        <filter id="rackGlow">
          <feGaussianBlur stdDeviation="3.5" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      {/* Fond */}
      <rect x={PAD.left} y={PAD.top} width={W-PAD.left-PAD.right} height={H-PAD.top-PAD.bottom}
        fill="#1c1c0e" rx={5} stroke="#3a3a20" strokeWidth={1}/>

      {/* Barres + croisillons */}
      {ROWS.map((r,ri) => {
        const y = PAD.top + (ri+0.5)*cellH;
        return (
          <g key={r}>
            <line x1={PAD.left} y1={y} x2={W-PAD.right} y2={y} stroke="#5a5a30" strokeWidth={1.5} strokeLinecap="round"/>
            {COLS.slice(0,-1).map((_,ci) => {
              const x1=PAD.left+(ci+0.5)*cellW, x2=PAD.left+(ci+1.5)*cellW;
              const yT=PAD.top+ri*cellH+3, yB=PAD.top+(ri+1)*cellH-3;
              return <g key={ci}>
                <line x1={x1} y1={yT} x2={x2} y2={yB} stroke="#3a3a18" strokeWidth={1} opacity={0.55}/>
                <line x1={x2} y1={yT} x2={x1} y2={yB} stroke="#3a3a18" strokeWidth={1} opacity={0.55}/>
              </g>;
            })}
            <text x={PAD.left-8} y={y+4} textAnchor="middle" fontSize={9} fill="#5a5a40" fontFamily="DM Sans,sans-serif">{r}</text>
          </g>
        );
      })}

      {/* Montants verticaux */}
      <rect x={PAD.left-4} y={PAD.top-3} width={5} height={H-PAD.top-PAD.bottom+6} fill="#6a6a3a" rx={2}/>
      <rect x={W-PAD.right-1} y={PAD.top-3} width={5} height={H-PAD.top-PAD.bottom+6} fill="#6a6a3a" rx={2}/>

      {/* Labels colonnes */}
      {COLS.map((c,ci) => (
        <text key={c} x={PAD.left+(ci+0.5)*cellW} y={PAD.top-8}
          textAnchor="middle" fontSize={9} fill="#5a5a40" fontFamily="DM Sans,sans-serif">{c}</text>
      ))}

      {/* Slots */}
      {ROWS.map((r,ri) => COLS.map((c,ci) => {
        const slot = `${r}${c}`;
        const cx   = PAD.left+(ci+0.5)*cellW;
        const cy   = PAD.top +(ri+0.5)*cellH;
        const isHL = highlightSlots.includes(slot);
        const hlIdx = highlightSlots.indexOf(slot);
        const occ  = occupiedSlots.find(o=>o.slot===slot);
        // En mode pick : cliquable seulement si sélectionnable ET case non occupée
        const isSelectable = mode!=="pick" || (
          (selectableSlots===null || selectableSlots.includes(slot)) && !occ
        );

        return (
          <g key={slot}
            onClick={()=>isSelectable&&mode==="pick"&&onSelect&&onSelect(slot)}
            style={{cursor:mode==="pick"&&isSelectable?"pointer":"not-allowed"}}>

            {/* Fond cliquable uniquement si sélectionnable */}
            {mode==="pick"&&isSelectable&&(
              <circle cx={cx} cy={cy} r={R+5} fill={isHL?"#c0392b33":"#ffffff08"}/>
            )}

            {/* Bouteille occupée — non cliquable, atténuée */}
            {occ&&!isHL&&(
              <circle cx={cx} cy={cy} r={R}
                fill={TYPE_COLOR[occ.type]||"#555"}
                opacity={mode==="pick"?0.65:0.38}/>
            )}
            {/* Croix sur case occupée en mode pick */}
            {occ&&!isHL&&mode==="pick"&&(
              <>
                <line x1={cx-R*0.4} y1={cy-R*0.4} x2={cx+R*0.4} y2={cy+R*0.4}
                  stroke="#fff" strokeWidth={1} opacity={0.5}/>
                <line x1={cx+R*0.4} y1={cy-R*0.4} x2={cx-R*0.4} y2={cy+R*0.4}
                  stroke="#fff" strokeWidth={1} opacity={0.5}/>
              </>
            )}

            {/* Case sélectionnée en mode pick */}
            {isHL&&mode==="pick"&&(
              <>
                <circle cx={cx} cy={cy} r={R} fill="#c0392b" opacity={0.95}/>
                {highlightSlots.length>1&&(
                  <text x={cx} y={cy+4} textAnchor="middle" fontSize={9} fill="#fff" fontFamily="DM Sans,sans-serif" fontWeight="bold">{hlIdx+1}</text>
                )}
              </>
            )}

            {/* Point lumineux en mode view */}
            {isHL&&mode==="view"&&(
              <>
                <circle cx={cx} cy={cy} r={R+6} fill="#e74c3c" opacity={0.12} filter="url(#rackGlow)"/>
                <circle cx={cx} cy={cy} r={R+2} fill="#c0392b" opacity={0.3}/>
                <circle cx={cx} cy={cy} r={R}   fill="#e74c3c" filter="url(#rackGlow)"/>
                <circle cx={cx-R*.28} cy={cy-R*.28} r={R*.26} fill="#fff" opacity={0.45}/>
                {highlightSlots.length>1&&(
                  <text x={cx} y={cy+4} textAnchor="middle" fontSize={9} fill="#fff" fontFamily="DM Sans,sans-serif" fontWeight="bold">{hlIdx+1}</text>
                )}
              </>
            )}
          </g>
        );
      }))}
    </svg>
  );
}

// ── Frigo SVG ─────────────────────────────────────────────────────────────────
function FrigoSVG({rangees, colonnes, highlightSlots=[], occupiedSlots=[], selectableSlots=null, onSelect, mode="view", maxW=320}){
  const ROWS = Array.from({length:rangees}, (_,i) => String.fromCharCode(65+i));
  const COLS = Array.from({length:colonnes}, (_,i) => i+1);
  const cellW = Math.min(42, (maxW - 40) / colonnes);
  const cellH = Math.min(36, cellW * 0.82);
  const W = cellW * colonnes + 40;
  const H = cellH * rangees + 44; // espace pour la poignée en haut
  const PAD = {top:36, left:28, right:10, bottom:8};
  const R = Math.min(cellW, cellH) * 0.28;

  return (
    <svg width={W} height={H} style={{display:"block", userSelect:"none", overflow:"visible"}}>
      <defs>
        <filter id="frigoGlow">
          <feGaussianBlur stdDeviation="3" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <linearGradient id="frigoBody" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stopColor="#1e2428"/>
          <stop offset="100%" stopColor="#252d32"/>
        </linearGradient>
        <linearGradient id="frigoShelf" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#3a4a54"/>
          <stop offset="100%" stopColor="#2a3a44"/>
        </linearGradient>
      </defs>

      {/* Corps du frigo */}
      <rect x={PAD.left-8} y={PAD.top-28} width={W-PAD.left-PAD.right+16} height={H-PAD.top+26+PAD.bottom}
        fill="url(#frigoBody)" rx={10} stroke="#3a4a54" strokeWidth={1.5}/>

      {/* Reflet gauche */}
      <rect x={PAD.left-5} y={PAD.top-24} width={3} height={H-PAD.top+20+PAD.bottom}
        fill="#ffffff" opacity={0.04} rx={2}/>

      {/* Poignée */}
      <rect x={W-PAD.right+2} y={PAD.top-18} width={6} height={28}
        fill="#4a5a64" rx={3} stroke="#5a6a74" strokeWidth={1}/>

      {/* Label ❄ */}
      <text x={PAD.left-2} y={PAD.top-14} fontSize={11} fill="#4a8fbf" fontFamily="DM Sans,sans-serif" opacity={0.7}>❄</text>

      {/* Clayettes (étagères) entre chaque rangée */}
      {ROWS.map((r,ri)=>{
        const y = PAD.top + ri*cellH;
        return (
          <g key={r}>
            {/* Étagère */}
            <rect x={PAD.left-6} y={y-3} width={W-PAD.left-PAD.right+14} height={4}
              fill="url(#frigoShelf)" rx={1} opacity={0.8}/>
            {/* Label rangée */}
            <text x={PAD.left-14} y={y+cellH/2+4} textAnchor="middle" fontSize={8}
              fill="#4a6070" fontFamily="DM Sans,sans-serif">{r}</text>
          </g>
        );
      })}
      {/* Étagère du bas */}
      <rect x={PAD.left-6} y={PAD.top+rangees*cellH-3} width={W-PAD.left-PAD.right+14} height={4}
        fill="url(#frigoShelf)" rx={1} opacity={0.8}/>

      {/* Labels colonnes */}
      {COLS.map((c,ci)=>(
        <text key={c} x={PAD.left+(ci+0.5)*cellW} y={PAD.top-10}
          textAnchor="middle" fontSize={8} fill="#4a6070" fontFamily="DM Sans,sans-serif">{c}</text>
      ))}

      {/* Slots */}
      {ROWS.map((r,ri)=>COLS.map((c,ci)=>{
        const slot = `${r}${c}`;
        const cx   = PAD.left+(ci+0.5)*cellW;
        const cy   = PAD.top+(ri+0.5)*cellH;
        const isHL = highlightSlots.includes(slot);
        const hlIdx = highlightSlots.indexOf(slot);
        const occ  = occupiedSlots.find(o=>o.slot===slot);
        const isSelectable = mode!=="pick" || (
          (selectableSlots===null || selectableSlots.includes(slot)) && !occ
        );

        const bW = Math.min(cellW*0.4, 10);
        const bH = Math.min(cellH*0.7, 18);

        return (
          <g key={slot}
            onClick={()=>isSelectable&&mode==="pick"&&onSelect&&onSelect(slot)}
            style={{cursor:mode==="pick"&&isSelectable?"pointer":"not-allowed"}}>

            {/* Zone cliquable */}
            {mode==="pick"&&(
              <rect x={cx-cellW/2+1} y={cy-cellH/2+2} width={cellW-2} height={cellH-4}
                fill={isHL?"#c0392b22":isSelectable?"#ffffff08":"transparent"} rx={4}/>
            )}

            {/* Silhouette bouteille occupée */}
            {occ&&!isHL&&(
              <g>
                <ellipse cx={cx} cy={cy} rx={bH/2} ry={bW/2}
                  fill={TYPE_COLOR[occ.type]||"#555"}
                  opacity={mode==="pick"?0.65:0.55}/>
                <ellipse cx={cx+bH/2-2} cy={cy} rx={3} ry={bW/2*0.6}
                  fill={TYPE_COLOR[occ.type]||"#555"}
                  opacity={mode==="pick"?0.5:0.4}/>
              </g>
            )}
            {/* Croix sur bouteille occupée en mode pick */}
            {occ&&!isHL&&mode==="pick"&&(
              <>
                <line x1={cx-5} y1={cy-3} x2={cx+5} y2={cy+3} stroke="#fff" strokeWidth={1} opacity={0.5}/>
                <line x1={cx+5} y1={cy-3} x2={cx-5} y2={cy+3} stroke="#fff" strokeWidth={1} opacity={0.5}/>
              </>
            )}

            {/* Sélectionné en mode pick */}
            {isHL&&mode==="pick"&&(
              <>
                <ellipse cx={cx} cy={cy} rx={bH/2} ry={bW/2} fill="#c0392b" opacity={0.9}/>
                {highlightSlots.length>1&&(
                  <text x={cx} y={cy+3} textAnchor="middle" fontSize={8} fill="#fff" fontFamily="DM Sans,sans-serif" fontWeight="bold">{hlIdx+1}</text>
                )}
              </>
            )}

            {/* Point lumineux en mode view */}
            {isHL&&mode==="view"&&(
              <>
                <ellipse cx={cx} cy={cy} rx={bH/2+4} ry={bW/2+3} fill="#e74c3c" opacity={0.12} filter="url(#frigoGlow)"/>
                <ellipse cx={cx} cy={cy} rx={bH/2} ry={bW/2} fill="#e74c3c" filter="url(#frigoGlow)"/>
                <ellipse cx={cx-bH/4} cy={cy-bW/4} rx={bH/6} ry={bW/5} fill="#fff" opacity={0.35}/>
                {highlightSlots.length>1&&(
                  <text x={cx} y={cy+3} textAnchor="middle" fontSize={8} fill="#fff" fontFamily="DM Sans,sans-serif" fontWeight="bold">{hlIdx+1}</text>
                )}
              </>
            )}
          </g>
        );
      }))}
    </svg>
  );
}

// ── Composant dispatch Rack/Frigo ─────────────────────────────────────────────
function StorageSVG({storageType="rack", rangees, colonnes, highlightSlots=[], occupiedSlots=[], selectableSlots=null, onSelect, mode="view", maxW=320}){
  const props = {rangees, colonnes, highlightSlots, occupiedSlots, selectableSlots, onSelect, mode, maxW};
  return storageType==="frigo" ? <FrigoSVG {...props}/> : <RackSVG {...props}/>;
}

// ── Modal Racks (plusieurs par lieu) ─────────────────────────────────────────
function ModalRacks({groupes, bouteilles, onSave, onClose}){
  const [groupeId, setGroupeId] = useState(groupes[0]?.id||"");
  const grp = groupes.find(g=>g.id===groupeId)||groupes[0];

  // Copie locale des racks du groupe actif
  const [racks, setRacks] = useState(()=>(grp?.racks||[]).map(r=>({...r})));
  const [editId, setEditId] = useState(null); // rack en cours d'édition

  const switchGroupe = id => {
    setGroupeId(id);
    const g = groupes.find(x=>x.id===id);
    setRacks((g?.racks||[]).map(r=>({...r})));
    setEditId(null);
  };

  const addRack = () => {
    const newRack = {id:uid(), nom:`Rack ${racks.length+1}`, rangees:9, colonnes:7, storageType:"rack"};
    setRacks(r=>[...r, newRack]);
    setEditId(newRack.id);
  };

  const updateRack = (id, k, v) => setRacks(r=>r.map(x=>x.id===id?{...x,[k]:v}:x));

  const removeRack = id => {
    const usedSlots = bouteilles.filter(b=>b.groupeId===groupeId&&b.rackId===id&&b.rackSlots?.length>0);
    if(usedSlots.length>0){alert(`Ce rack contient ${usedSlots.length} bouteille(s) placée(s). Retirez-les d'abord.`);return;}
    setRacks(r=>r.filter(x=>x.id!==id));
    if(editId===id) setEditId(null);
  };

  const Stepper = ({label, val, min, max, onChange, suffix}) => (
    <div style={{background:C.bg,borderRadius:10,padding:"12px",textAlign:"center",border:`1px solid ${C.border}`}}>
      <div style={{fontSize:10,color:C.sub2,letterSpacing:1,textTransform:"uppercase",fontFamily:"'DM Sans',sans-serif",marginBottom:8,fontWeight:600}}>{label}</div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10,marginBottom:4}}>
        <button onClick={()=>onChange(v=>Math.max(min,v-1))} style={{width:30,height:30,borderRadius:8,border:`1px solid ${C.border}`,background:C.card2,color:C.text,cursor:"pointer",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
        <div style={{fontFamily:"'Playfair Display',serif",fontSize:28,color:C.text,fontWeight:700,minWidth:32,textAlign:"center"}}>{val}</div>
        <button onClick={()=>onChange(v=>Math.min(max,v+1))} style={{width:30,height:30,borderRadius:8,border:`1px solid ${C.border}`,background:C.card2,color:C.text,cursor:"pointer",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
      </div>
      {suffix&&<div style={{fontSize:10,color:C.sub2,fontFamily:"'DM Sans',sans-serif"}}>{suffix}</div>}
    </div>
  );

  return (
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.78)",backdropFilter:"blur(8px)",zIndex:300,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
      <div onClick={e=>e.stopPropagation()} style={{background:C.card,width:"100%",maxWidth:480,borderRadius:"24px 24px 0 0",padding:"0 0 36px",maxHeight:"92vh",overflowY:"auto",boxShadow:"0 -20px 60px rgba(0,0,0,0.8)"}}>
        <div style={{display:"flex",justifyContent:"center",padding:"12px 0 8px"}}><div style={{width:40,height:4,borderRadius:2,background:C.border}}/></div>
        <div style={{padding:"8px 20px 16px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:20,color:C.text,margin:"0 0 3px",fontWeight:700}}>Racks de rangement</h2>
            <div style={{fontSize:12,color:C.sub2,fontFamily:"'DM Sans',sans-serif"}}>Ajoutez et configurez les racks de chaque lieu</div>
          </div>
          <button onClick={onClose} style={{background:C.card2,border:"none",borderRadius:10,width:34,height:34,color:C.sub,cursor:"pointer",fontSize:17}}>✕</button>
        </div>

        <div style={{padding:"16px 20px 0"}}>
          {/* Choix du lieu */}
          {groupes.length>1&&(
            <div style={{marginBottom:16}}>
              <div style={{fontSize:11,color:C.sub2,letterSpacing:1.2,textTransform:"uppercase",fontFamily:"'DM Sans',sans-serif",marginBottom:8,fontWeight:600}}>Lieu de rangement</div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {groupes.map(g=>(
                  <button key={g.id} onClick={()=>switchGroupe(g.id)} style={{
                    padding:"7px 14px",borderRadius:10,fontSize:13,fontWeight:600,
                    border:`1px solid ${groupeId===g.id?"#f39c12":C.border}`,
                    background:groupeId===g.id?"#f39c1222":C.card2,
                    color:groupeId===g.id?"#f39c12":C.sub,
                    cursor:"pointer",fontFamily:"'DM Sans',sans-serif",
                  }}>
                    {g.nom}
                    {(g.racks?.length||0)>0&&<span style={{marginLeft:5,fontSize:10,opacity:0.6}}>({g.racks.length} rack{g.racks.length>1?"s":""})</span>}
                  </button>
                ))}
              </div>
            </div>
          )}

          {/* Liste des racks */}
          <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:14}}>
            {racks.length===0&&(
              <div style={{textAlign:"center",padding:"24px 0",color:C.sub2,fontFamily:"'DM Sans',sans-serif",fontSize:13}}>
                Aucun rack — cliquez sur "+ Ajouter" ci-dessous
              </div>
            )}
            {racks.map((rack,idx)=>{
              const isEdit = editId===rack.id;
              const usedSlots = bouteilles.filter(b=>b.groupeId===groupeId&&b.rackId===rack.id&&b.rackSlots?.length>0).length;
              const totalSlots = rack.rangees*rack.colonnes;
              const accent = rack.storageType==="frigo"?"#4a8fbf":"#f39c12";

              return (
                <div key={rack.id} style={{background:C.card2,borderRadius:14,overflow:"hidden",border:`1px solid ${isEdit?accent+"66":C.border}`}}>
                  {/* En-tête cliquable */}
                  <div style={{display:"flex",alignItems:"center",gap:10,padding:"12px 14px",cursor:"pointer"}} onClick={()=>setEditId(isEdit?null:rack.id)}>
                    <div style={{width:34,height:34,borderRadius:9,background:accent+"18",border:`1px solid ${accent}30`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>
                      {rack.storageType==="frigo"?"❄":"🗄"}
                    </div>
                    <div style={{flex:1}}>
                      <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:14,fontWeight:600,color:C.text}}>{rack.nom}</div>
                      <div style={{fontSize:11,color:C.sub}}>{rack.rangees}×{rack.colonnes} · {totalSlots} emplacements · {usedSlots} occupés</div>
                    </div>
                    <span style={{color:C.sub,fontSize:14}}>{isEdit?"▲":"▼"}</span>
                    <button onClick={e=>{e.stopPropagation();removeRack(rack.id);}} style={{background:"none",border:"none",color:"#c0392b66",cursor:"pointer",fontSize:16,padding:"4px 6px"}}>🗑</button>
                  </div>

                  {/* Formulaire édition */}
                  {isEdit&&(
                    <div style={{padding:"0 14px 14px",borderTop:`1px solid ${C.border}`}}>
                      {/* Nom */}
                      <div style={{marginTop:12,marginBottom:12}}>
                        <div style={{fontSize:10,color:C.sub2,letterSpacing:1,textTransform:"uppercase",fontFamily:"'DM Sans',sans-serif",marginBottom:5}}>Nom du rack</div>
                        <input value={rack.nom} onChange={e=>updateRack(rack.id,"nom",e.target.value)}
                          style={{width:"100%",background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 12px",color:C.text,fontSize:14,fontFamily:"'DM Sans',sans-serif",outline:"none",boxSizing:"border-box"}}/>
                      </div>

                      {/* Type rack/frigo */}
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
                        {[{k:"rack",icon:"🗄",l:"Rack à vin",c:"#f39c12"},{k:"frigo",icon:"❄",l:"Frigo à vin",c:"#4a8fbf"}].map(({k,icon,l,c})=>(
                          <button key={k} onClick={()=>updateRack(rack.id,"storageType",k)} style={{
                            padding:"10px 8px",borderRadius:10,textAlign:"center",
                            border:`2px solid ${rack.storageType===k?c:C.border}`,
                            background:rack.storageType===k?c+"18":C.bg,
                            cursor:"pointer",transition:"all 0.15s",
                          }}>
                            <div style={{fontSize:20,marginBottom:4}}>{icon}</div>
                            <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:12,fontWeight:700,color:rack.storageType===k?c:C.sub}}>{l}</div>
                          </button>
                        ))}
                      </div>

                      {/* Rangées / colonnes */}
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
                        <Stepper label="Rangées" val={rack.rangees} min={1} max={20}
                          onChange={fn=>updateRack(rack.id,"rangees",fn(rack.rangees))}
                          suffix={`A → ${String.fromCharCode(64+rack.rangees)}`}/>
                        <Stepper label="Colonnes" val={rack.colonnes} min={1} max={15}
                          onChange={fn=>updateRack(rack.id,"colonnes",fn(rack.colonnes))}
                          suffix={`1 → ${rack.colonnes}`}/>
                      </div>

                      {/* Aperçu */}
                      <div style={{background:C.bg,borderRadius:10,padding:10,overflowX:"auto",border:`1px solid ${C.border}`}}>
                        <StorageSVG storageType={rack.storageType} rangees={rack.rangees} colonnes={rack.colonnes} mode="view" maxW={320}/>
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          {/* Bouton ajouter */}
          <button onClick={addRack} style={{
            width:"100%",padding:"12px",borderRadius:12,
            border:"1px dashed #f39c1266",background:"#f39c1208",
            color:"#f39c12",fontFamily:"'DM Sans',sans-serif",fontSize:14,fontWeight:600,
            cursor:"pointer",marginBottom:16,
          }}>+ Ajouter un rack</button>

          {/* Résumé total */}
          {racks.length>0&&(
            <div style={{display:"flex",gap:10,marginBottom:16}}>
              {[
                [racks.length, `rack${racks.length>1?"s":""}`, "#f39c12"],
                [racks.reduce((s,r)=>s+r.rangees*r.colonnes,0), "emplacements", C.sub],
              ].map(([v,k,c])=>(
                <div key={k} style={{flex:1,background:C.card2,borderRadius:10,padding:"10px",textAlign:"center"}}>
                  <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,color:c,fontWeight:700}}>{v}</div>
                  <div style={{fontSize:10,color:C.sub2,fontFamily:"'DM Sans',sans-serif"}}>{k}</div>
                </div>
              ))}
            </div>
          )}

          <button onClick={()=>onSave(groupeId, racks)} style={{
            width:"100%",padding:"14px",borderRadius:14,border:"none",
            background:"linear-gradient(135deg,#8b6010,#f39c12)",
            color:"#0e0a06",fontWeight:700,fontFamily:"'DM Sans',sans-serif",fontSize:15,cursor:"pointer",
          }}>
            ✓ Enregistrer ({racks.length} rack{racks.length!==1?"s":""})
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Page Dashboard ─────────────────────────────────────────────────────────────
function PageDashboard({bouteilles,groupes,regions,onGererLieux,onGererRegions,onGererRacks,onVueRack,onSuggestions,onRegionClick}){
  const [regionActive, setRegionActive] = useState(null);
  const totalQte = bouteilles.reduce((s,b)=>s+b.quantite,0);
  const totalVal = bouteilles.reduce((s,b)=>s+(b.prix||0)*b.quantite,0);

  // Répartition par région — TOUTES les régions présentes
  const byRegion={};
  bouteilles.forEach(b=>{ byRegion[b.region]=(byRegion[b.region]||0)+b.quantite; });
  const regionPalette=[
    "#c0392b","#8e44ad","#2980b9","#27ae60","#f39c12",
    "#16a085","#d35400","#2c3e50","#e91e8c","#1abc9c",
    "#e67e22","#34495e","#7f8c8d","#6c3483","#1a5276",
  ];
  const regionData=Object.entries(byRegion)
    .sort((a,b)=>b[1]-a[1])
    .map(([r,v],i)=>({r,v,color:regionPalette[i%regionPalette.length]}));
  const totalRegion=regionData.reduce((s,d)=>s+d.v,0)||1;
  const maxQte = regionData.length>0 ? regionData[0].v : 1;
  // Régions hors France
  const regionsFR = ["Bordeaux","Bourgogne","Champagne","Alsace","Rhône","Loire","Languedoc","Provence","Sud-Ouest","Jura","Savoie"];
  const regionsEtrangeres = regionData.filter(d=>!regionsFR.includes(d.r));

  // Bientôt à boire
  const bientot=bouteilles.filter(b=>{
    const g=getGarde(b.region,b.type,b.millesime);
    return g.statut==="pret"||g.statut==="apogee";
  }).slice(0,4);

  // Vins en déclin à consommer en priorité
  const enDeclin=bouteilles.filter(b=>{
    const g=getGarde(b.region,b.type,b.millesime);
    return g.statut==="declin"&&b.quantite>0;
  });

  // Lieux de rangement stats
  const lieuxStats=groupes.map(g=>({
    ...g,
    qte: bouteilles.filter(b=>b.groupeId===g.id).reduce((s,b)=>s+b.quantite,0),
    refs: bouteilles.filter(b=>b.groupeId===g.id).length,
  }));

  const hasRackConfigured = groupes.some(g=>g.racks&&g.racks.length>0);

  return (
    <div style={{paddingBottom:80}}>
      {/* Header */}
      <div style={{padding:"20px 20px 0",marginBottom:20,display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
        <div>
          <div style={{fontSize:12,color:C.sub,fontFamily:"'DM Sans',sans-serif",marginBottom:4}}>Bonjour 👋</div>
          <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:26,color:C.text,margin:0,fontWeight:700}}>Ma Cave</h1>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:8,flexShrink:0}}>
          {[
            {label:"🏠 Lieux",    fn:onGererLieux,   c:"#27ae60"},
            {label:"🗺 Régions",  fn:onGererRegions, c:"#2980b9"},
            {label:"🗄 Racks",    fn:onGererRacks,   c:"#f39c12"},
          ].map(({label,fn,c})=>(
            <button key={label} onClick={fn} style={{
              display:"flex",alignItems:"center",gap:7,padding:"7px 11px",borderRadius:10,
              border:`1px solid ${C.border}`,background:C.card,
              color:C.sub,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",
              fontSize:11,fontWeight:600,transition:"all 0.15s",
            }}
              onMouseEnter={e=>{e.currentTarget.style.borderColor=c;e.currentTarget.style.color=c;}}
              onMouseLeave={e=>{e.currentTarget.style.borderColor=C.border;e.currentTarget.style.color=C.sub;}}>
              {label}
            </button>
          ))}
        </div>
      </div>

      <div style={{padding:"0 16px",display:"flex",flexDirection:"column",gap:14}}>

        {/* Cartes actions rapides */}
        {(hasRackConfigured||bouteilles.length>0)&&(
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
            {hasRackConfigured&&(
              <button onClick={onVueRack} style={{
                background:"linear-gradient(145deg,#0e1a10,#122018)",border:`1px solid #27ae6030`,
                borderRadius:12,padding:"14px 12px",cursor:"pointer",textAlign:"left",
              }}>
                <div style={{fontSize:22,marginBottom:6}}>🗄</div>
                <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:13,fontWeight:700,color:"#27ae60",marginBottom:2}}>Vue du rack</div>
                <div style={{fontSize:10,color:C.sub2,fontFamily:"'DM Sans',sans-serif"}}>Voir les emplacements</div>
              </button>
            )}
            {bouteilles.filter(b=>b.quantite>0).length>0&&(
              <button onClick={onSuggestions} style={{
                background:"linear-gradient(145deg,#0e180a,#10200e)",border:`1px solid #f39c1230`,
                borderRadius:12,padding:"14px 12px",cursor:"pointer",textAlign:"left",
              }}>
                <div style={{fontSize:22,marginBottom:6}}>🍽</div>
                <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:13,fontWeight:700,color:"#f39c12",marginBottom:2}}>Ce soir</div>
                <div style={{fontSize:10,color:C.sub2,fontFamily:"'DM Sans',sans-serif"}}>Accord mets-vins</div>
              </button>
            )}
          </div>

        {/* Alerte vins en déclin */}
        {enDeclin.length>0&&(
          <div style={{background:"linear-gradient(145deg,#200a0a,#2a1010)",border:"1px solid #c0392b44",borderRadius:12,padding:"14px 16px",marginBottom:14}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
              <span style={{fontSize:18}}>⚠️</span>
              <div>
                <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:13,fontWeight:700,color:"#e74c3c"}}>À consommer en priorité</div>
                <div style={{fontSize:11,color:C.sub2,fontFamily:"'DM Sans',sans-serif"}}>{enDeclin.length} vin{enDeclin.length>1?"s":""} en déclin</div>
              </div>
            </div>
            {enDeclin.slice(0,3).map(b=>(
              <div key={b.id} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                <Dot type={b.type} size={8}/>
                <span style={{flex:1,fontSize:12,color:"#e0a090",fontFamily:"'DM Sans',sans-serif",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{b.nom}{b.millesime&&` ${b.millesime}`}</span>
                <span style={{fontSize:11,color:"#c0392b",fontFamily:"'DM Sans',sans-serif"}}>{b.quantite} btl</span>
              </div>
            ))}
            {enDeclin.length>3&&<div style={{fontSize:11,color:"#804040",fontFamily:"'DM Sans',sans-serif"}}>{enDeclin.length-3} de plus…</div>}
          </div>
        )}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <Card style={{background:`linear-gradient(135deg,#c0392b22,#c0392b08)`,border:`1px solid #c0392b30`}}>
            <Lbl>Valeur totale</Lbl>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:26,color:C.text,fontWeight:700,lineHeight:1}}>{totalVal>0?`${totalVal.toLocaleString("fr-FR")} €`:"— €"}</div>
          </Card>
          <Card style={{background:`linear-gradient(135deg,#8e44ad22,#8e44ad08)`,border:`1px solid #8e44ad30`}}>
            <Lbl>Bouteilles</Lbl>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:26,color:C.text,fontWeight:700,lineHeight:1}}>{totalQte}</div>
            <div style={{fontSize:11,color:C.sub,marginTop:4}}>{bouteilles.length} références</div>
          </Card>
        </div>

        {/* ── Carte & Répartition par région ── */}
        {regionData.length>0?(
          <Card>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <div>
                <Lbl>Répartition par région</Lbl>
                <div style={{fontSize:12,color:C.sub2,fontFamily:"'DM Sans',sans-serif"}}>{regionData.length} région{regionData.length>1?"s":""} · {totalRegion} bouteille{totalRegion>1?"s":""}</div>
              </div>
              {regionActive&&(
                <button onClick={()=>{setRegionActive(null);}} style={{fontSize:11,color:C.sub,background:"none",border:`1px solid ${C.border}`,borderRadius:8,padding:"4px 10px",cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>
                  ✕ {regionActive}
                </button>
              )}
            </div>

            {/* Onglets vue */}
            {[["carte","🗺 Carte"],["donut","◎ Graphique"]].map(([v,l])=>(null))}

            {/* Carte de France */}
            <CarteFrance
              byRegion={byRegion}
              maxQte={maxQte}
              regionActive={regionActive}
              onRegionClick={r=>{
                setRegionActive(prev=>prev===r?null:r);
                onRegionClick&&onRegionClick(r);
              }}
            />

            {/* Message si région cliquée */}
            {regionActive&&(
              <div style={{marginTop:10,padding:"8px 12px",background:"#c0392b18",borderRadius:10,display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:14}}>🍷</span>
                <span style={{fontSize:12,color:"#e74c3c",fontFamily:"'DM Sans',sans-serif",fontWeight:600}}>

            {/* Séparateur */}
            <div style={{height:1,background:C.border,margin:"16px 0"}}/>

            {/* Donut centré */}
            <div style={{display:"flex",justifyContent:"center",marginBottom:16,position:"relative"}}>

            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {regionData.map(d=>{
                const pct=Math.round(d.v/totalRegion*100);
                const isAct = regionActive===d.r;

                  <div key={d.r} onClick={()=>{

                  }} style={{cursor:regionsFR.includes(d.r)?"pointer":"default",opacity:regionActive&&!isAct?0.5:1,transition:"opacity 0.2s"}}>

                      <div style={{width:10,height:10,borderRadius:"50%",background:d.color,flexShrink:0}}/>
                      <span style={{flex:1,fontSize:13,color:isAct?C.text:C.sub,fontFamily:"'DM Sans',sans-serif",fontWeight:isAct?700:500}}>{d.r}</span>
                      <span style={{fontSize:12,color:C.sub,fontFamily:"'DM Sans',sans-serif"}}>{d.v} btl</span>
                      <span style={{fontSize:12,color:d.color,fontFamily:"'DM Sans',sans-serif",fontWeight:700,minWidth:32,textAlign:"right"}}>{pct}%</span>
                    </div>
                    <div style={{height:3,background:C.card2,borderRadius:2,overflow:"hidden"}}>
                      <div style={{height:"100%",width:`${pct}%`,background:d.color,borderRadius:2,transition:"width 0.6s ease"}}/>
                    </div>
                  </div>
                );
              })}
            </div>

            {/* Régions étrangères si présentes */}
            {regionsEtrangeres.length>0&&(
              <div style={{marginTop:14,padding:"12px",background:C.bg,borderRadius:10,border:`1px solid ${C.border}`}}>
                <div style={{fontSize:10,color:C.sub2,letterSpacing:1.2,textTransform:"uppercase",fontFamily:"'DM Sans',sans-serif",marginBottom:8,fontWeight:600}}>🌍 Hors France</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                  {regionsEtrangeres.map(d=>(
                    <div key={d.r} style={{display:"flex",alignItems:"center",gap:5,background:C.card2,borderRadius:8,padding:"4px 10px"}}>

                  ))}

              </div>
            )}
          </Card>
        ):(
          bouteilles.length>0&&null

        {/* Lieux de rangement */}
        {lieuxStats.some(l=>l.qte>0)&&(
          <Card>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <Lbl>Lieux de rangement</Lbl>
              <button onClick={onGererLieux} style={{fontSize:12,color:"#27ae60",background:"none",border:"none",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontWeight:600}}>Gérer ›</button>
            </div>
            {lieuxStats.filter(l=>l.qte>0).map(l=>(
              <div key={l.id} style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
                <div style={{width:8,height:8,borderRadius:"50%",background:"#27ae60",flexShrink:0}}/>
                <span style={{flex:1,fontSize:13,color:C.text,fontFamily:"'DM Sans',sans-serif"}}>{l.nom}</span>
                <span style={{fontSize:12,color:C.sub,fontFamily:"'DM Sans',sans-serif"}}>{l.refs} réf. · {l.qte} btl</span>
              </div>
            ))}
          </Card>
        )}

        {/* À boire bientôt */}
        {bientot.length>0&&(
          <Card>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <Lbl>À boire bientôt</Lbl>
              <span style={{fontSize:12,color:C.accent,fontFamily:"'DM Sans',sans-serif"}}>{bientot.length} vins à maturité</span>
            </div>
            {bientot.map((b,i)=>{
              const g=getGarde(b.region,b.type,b.millesime);
              return (
                <div key={b.id} style={{display:"flex",alignItems:"center",gap:12,
                  paddingBottom:i<bientot.length-1?12:0,marginBottom:i<bientot.length-1?12:0,
                  borderBottom:i<bientot.length-1?`1px solid ${C.border}`:"none"}}>
                  <div style={{width:38,height:38,borderRadius:10,background:TYPE_COLOR[b.type]+"22",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                    <Dot type={b.type} size={14}/>
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:14,fontWeight:600,color:C.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{b.nom}</div>
                    <div style={{fontSize:12,color:C.sub}}>{b.region}</div>
                  </div>
                  {b.millesime&&(
                    <div style={{background:C.accent+"22",border:`1px solid ${C.accent}44`,borderRadius:8,padding:"4px 10px",fontSize:12,fontWeight:700,color:C.accent,fontFamily:"'DM Sans',sans-serif"}}>
                      {b.millesime+g.peak}
                    </div>
                  )}
                </div>
              );
            })}
          </Card>
        )}

        {bouteilles.length===0&&(
          <div style={{textAlign:"center",padding:"60px 0",color:C.sub2}}>
            <div style={{fontSize:52,marginBottom:16}}>🍾</div>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,color:C.sub,marginBottom:8}}>Votre cave est vide</div>
            <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:13,color:C.sub2}}>Commencez par ajouter votre premier vin</div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── Page Cave (inventaire) ─────────────────────────────────────────────────────
function PageCave({bouteilles,groupes,regions,initialRegion,onFilterConsumed,onVinClick}){
  const [search,setSearch]         = useState("");
  const [showFilters,setShowFilters] = useState(false);
  const [fType,setFType]           = useState([]);
  const [fVolume,setFVolume]       = useState([]);
  const [fGroupe,setFGroupe]       = useState([]);
  const [fRegion,setFRegion]       = useState(()=>initialRegion?[initialRegion]:[]);
  const [sortBy,setSortBy]         = useState("couleur");

  // Si initialRegion change depuis l'extérieur, ouvrir les filtres
  useEffect(()=>{
    if(initialRegion){
      setFRegion([initialRegion]);
      setShowFilters(true);
      onFilterConsumed&&onFilterConsumed();
    }
  },[initialRegion]);

  const toggle = (arr,setArr,val) => setArr(prev => prev.includes(val)?prev.filter(x=>x!==val):[...prev,val]);
  const resetAll = () => {setFType([]);setFVolume([]);setFGroupe([]);setFRegion([]);setSortBy("couleur");setSearch("");};
  const nbFiltres = fType.length+fVolume.length+fGroupe.length+fRegion.length+(sortBy!=="couleur"?1:0);

  // regions vient de la prop (liste personnalisable)

  const filtered = bouteilles
    .filter(b=>!search||b.nom.toLowerCase().includes(search.toLowerCase())||(b.domaine||"").toLowerCase().includes(search.toLowerCase()))
    .filter(b=>fType.length===0||fType.includes(b.type))
    .filter(b=>fVolume.length===0||fVolume.includes(b.volume||"75 cl"))
    .filter(b=>fGroupe.length===0||fGroupe.includes(b.groupeId))
    .filter(b=>fRegion.length===0||fRegion.includes(b.region))
    .sort((a,b)=>{
      if(sortBy==="nom")       return a.nom.localeCompare(b.nom);
      if(sortBy==="millesime") return (b.millesime||0)-(a.millesime||0);
      if(sortBy==="region")    return a.region.localeCompare(b.region)||a.nom.localeCompare(b.nom);
      // couleur (défaut) : type puis région puis nom
      return a.type.localeCompare(b.type)||a.region.localeCompare(b.region)||a.nom.localeCompare(b.nom);
    });

  const totalQte = bouteilles.reduce((s,b)=>s+b.quantite,0);

  // ── Section filtre multi-select ──────────────────────────────────────────────
  const FilterSection = ({title,items,active,onToggle,color="#888",renderLabel})=>(
    <div style={{marginBottom:18}}>
      <div style={{fontSize:11,color:C.sub2,letterSpacing:1.2,textTransform:"uppercase",fontFamily:"'DM Sans',sans-serif",marginBottom:8,fontWeight:600}}>{title}</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
        {items.map(item=>{
          const val = typeof item==="object"?item.id:item;
          const lbl = renderLabel?renderLabel(item):(typeof item==="object"?item.nom:item);
          const isActive = active.includes(val);
          return (
            <button key={val} onClick={()=>onToggle(val)} style={{
              padding:"7px 14px",borderRadius:20,fontSize:13,fontWeight:isActive?700:400,
              border:`1px solid ${isActive?color:C.border}`,
              background:isActive?color+"28":C.card2,
              color:isActive?color:C.sub,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",
              transition:"all 0.15s",display:"flex",alignItems:"center",gap:6,
            }}>
              {typeof item==="object"&&item.type&&<Dot type={item.type} size={8}/>}
              {lbl}
            </button>
          );
        })}
      </div>
    </div>
  );

  return (
    <div style={{paddingBottom:80}}>
      <div style={{padding:"20px 16px 14px"}}>
        <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:24,color:C.text,margin:"0 0 14px",fontWeight:700}}>Ma cave</h1>

        {/* Barre recherche + bouton filtre */}
        <div style={{display:"flex",gap:10,marginBottom:12}}>
          <div style={{position:"relative",flex:1}}>
            <span style={{position:"absolute",left:13,top:"50%",transform:"translateY(-50%)",color:C.sub2,fontSize:15}}>🔍</span>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Rechercher un vin…"
              style={{width:"100%",background:C.card,border:`1px solid ${C.border}`,borderRadius:12,
                padding:"10px 14px 10px 38px",color:C.text,fontSize:14,fontFamily:"'DM Sans',sans-serif",
                outline:"none",boxSizing:"border-box"}}/>
          </div>
          <button onClick={()=>setShowFilters(v=>!v)} style={{
            position:"relative",
            padding:"10px 14px",borderRadius:12,
            border:`1px solid ${showFilters||nbFiltres>0?C.accent:C.border}`,
            background:showFilters?C.accent+"22":C.card,
            color:showFilters||nbFiltres>0?C.accent:C.sub,
            cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontSize:13,fontWeight:600,
            display:"flex",alignItems:"center",gap:6,flexShrink:0,
          }}>
            ⚙ Filtres
            {nbFiltres>0&&(
              <span style={{
                position:"absolute",top:-6,right:-6,
                width:18,height:18,borderRadius:"50%",
                background:C.accent,color:"#fff",
                fontSize:10,fontWeight:700,
                display:"flex",alignItems:"center",justifyContent:"center",
              }}>{nbFiltres}</span>
            )}
          </button>
        </div>

        {/* Panneau filtres dépliable */}
        {showFilters&&(
          <div style={{background:C.card,borderRadius:16,padding:"18px 16px",marginBottom:14,border:`1px solid ${C.border}`}}>

            {/* Tri */}
            <div style={{marginBottom:18}}>
              <div style={{fontSize:11,color:C.sub2,letterSpacing:1.2,textTransform:"uppercase",fontFamily:"'DM Sans',sans-serif",marginBottom:8,fontWeight:600}}>Trier par</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                {[["couleur","🎨 Couleur"],["nom","🔤 Nom"],["millesime","📅 Millésime"],["region","🗺 Région"]].map(([val,lbl])=>(
                  <button key={val} onClick={()=>setSortBy(val)} style={{
                    padding:"7px 14px",borderRadius:20,fontSize:13,fontWeight:sortBy===val?700:400,
                    border:`1px solid ${sortBy===val?"#8e44ad":C.border}`,
                    background:sortBy===val?"#8e44ad28":C.card2,
                    color:sortBy===val?"#a855f7":C.sub,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",
                    transition:"all 0.15s",
                  }}>{lbl}</button>
                ))}
              </div>
            </div>

            {/* Couleur / type */}
            <FilterSection
              title="Couleur de vin"
              items={TYPES}
              active={fType}
              onToggle={v=>toggle(fType,setFType,v)}
              color={fType.length===1?TYPE_COLOR[fType[0]]:"#c0392b"}
              renderLabel={t=><span style={{display:"flex",alignItems:"center",gap:5}}><Dot type={t} size={8}/>{t}</span>}
            />

            {/* Volume */}
            <FilterSection
              title="Volume"
              items={VOLUMES}
              active={fVolume}
              onToggle={v=>toggle(fVolume,setFVolume,v)}
              color="#2980b9"
            />

            {/* Lieu de rangement */}
            {groupes.length>0&&(
              <FilterSection
                title="Lieu de rangement"
                items={groupes}
                active={fGroupe}
                onToggle={v=>toggle(fGroupe,setFGroupe,v)}
                color="#27ae60"
              />
            )}

            {/* Région */}
            {regions.length>0&&(
              <FilterSection
                title="Région"
                items={regions}
                active={fRegion}
                onToggle={v=>toggle(fRegion,setFRegion,v)}
                color="#f39c12"
              />
            )}

            {/* Reset */}
            {nbFiltres>0&&(
              <button onClick={resetAll} style={{
                width:"100%",padding:"10px",borderRadius:10,
                border:`1px solid #c0392b44`,background:"#c0392b18",
                color:"#c0392b",fontFamily:"'DM Sans',sans-serif",fontSize:13,
                fontWeight:600,cursor:"pointer",marginTop:4,
              }}>✕ Réinitialiser tous les filtres</button>
            )}
          </div>
        )}

        {/* Compteur résultats */}
        <div style={{fontSize:12,color:C.sub,fontFamily:"'DM Sans',sans-serif",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span>{filtered.length} bouteille{filtered.length!==1?"s":""}{nbFiltres>0?` · ${nbFiltres} filtre${nbFiltres>1?"s":""}`:""}</span>
          <span style={{color:C.sub2}}>{totalQte} en stock total</span>
        </div>
      </div>

      {/* Liste */}
      <div style={{padding:"0 16px",display:"flex",flexDirection:"column",gap:10}}>
        {filtered.length===0?(
          <div style={{textAlign:"center",padding:"50px 0",color:C.sub2}}>
            <div style={{fontSize:36,marginBottom:10}}>🔍</div>
            <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:14,marginBottom:12}}>Aucun résultat</div>
            {nbFiltres>0&&<button onClick={resetAll} style={{padding:"8px 18px",borderRadius:10,border:`1px solid ${C.border}`,background:C.card,color:C.sub,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontSize:13}}>Effacer les filtres</button>}
          </div>
        ):filtered.map(b=>{
          const g=getGarde(b.region,b.type,b.millesime);
          const grp=groupes.find(x=>x.id===b.groupeId);
          return (
            <div key={b.id} onClick={()=>onVinClick(b)}
              style={{background:C.card,borderRadius:14,padding:"14px 16px",cursor:"pointer",
                display:"flex",alignItems:"center",gap:14,
                border:`1px solid ${C.border}`,transition:"background 0.15s"}}
              onMouseEnter={e=>e.currentTarget.style.background=C.card2}
              onMouseLeave={e=>e.currentTarget.style.background=C.card}>
              <div style={{width:44,height:44,borderRadius:12,background:TYPE_COLOR[b.type]+"18",
                display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,
                border:`1px solid ${TYPE_COLOR[b.type]}30`}}>
                <Dot type={b.type} size={16}/>
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:15,fontWeight:600,color:C.text,marginBottom:2,
                  whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
                  {b.nom}
                  {b.millesime&&<span style={{color:C.sub,fontWeight:400,fontSize:13,marginLeft:6}}>{b.millesime}</span>}
                </div>
                <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
                  {b.domaine&&<span style={{fontSize:12,color:C.sub,fontStyle:"italic"}}>{b.domaine}</span>}
                  <span style={{fontSize:11,color:C.sub2}}>{b.region}</span>
                  {b.volume&&b.volume!=="75 cl"&&<span style={{fontSize:10,color:C.sub2,background:C.card2,borderRadius:6,padding:"1px 6px"}}>{b.volume}</span>}
                  {grp&&<span style={{fontSize:10,color:C.sub2,background:C.card2,borderRadius:6,padding:"1px 6px"}}>{grp.nom}</span>}
                </div>
              </div>
              <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6,flexShrink:0}}>
                <div style={{
                  background:b.quantite<=2?"#f39c1218":"#27ae6018",
                  color:b.quantite<=2?"#f39c12":"#27ae60",
                  borderRadius:8,padding:"3px 10px",fontSize:13,fontWeight:700,
                  fontFamily:"'DM Sans',sans-serif",
                }}>{b.quantite} btl</div>
                <StatutChip statut={g.statut}/>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── Étoiles de notation ───────────────────────────────────────────────────────

// ── Fiche détail ──────────────────────────────────────────────────────────────
function FicheVin({vin, groupes, bouteilles, historique, onClose, onConsommer, onDelete, onEdit, onSaveNote}){
  const [noteEdit,  setNoteEdit]  = useState(vin.note||0);
  const [commentEdit, setCommentEdit] = useState(vin.commentaire||"");
  const [noteOpen,  setNoteOpen]  = useState(false);
  const [confirmSuppr, setConfirmSuppr] = useState(false);

  const g=getGarde(vin.region,vin.type,vin.millesime);
  const ac=getAccord(vin.region,vin.type);
  const statMap={jeune:{l:"Trop jeune",c:"#2980b9",bg:"#2980b918"},pret:{l:"Bientôt prêt",c:"#f39c12",bg:"#f39c1218"},apogee:{l:"À son apogée ✨",c:"#27ae60",bg:"#27ae6018"},declin:{l:"En déclin",c:"#7f8c8d",bg:"#7f8c8d18"},"?":{l:"—",c:C.sub,bg:C.card2}};
  const st=statMap[g.statut]||statMap["?"];

      <div onClick={e=>e.stopPropagation()} style={{

        boxShadow:"0 -20px 60px rgba(0,0,0,0.6)",
      }}>
        <div style={{display:"flex",justifyContent:"center",padding:"12px 0 8px"}}>
          <div style={{width:40,height:4,borderRadius:2,background:C.border}}/>
        </div>

        <div style={{padding:"12px 20px 20px",borderBottom:`1px solid ${C.border}`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div style={{flex:1}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                <div style={{background:TYPE_COLOR[vin.type]+"22",border:`1px solid ${TYPE_COLOR[vin.type]}44`,borderRadius:8,padding:"3px 10px",fontSize:12,fontWeight:600,color:TYPE_COLOR[vin.type],fontFamily:"'DM Sans',sans-serif"}}>{vin.type}</div>

              </div>
              <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:22,color:C.text,margin:"0 0 4px",fontWeight:700,lineHeight:1.2}}>{vin.nom}</h2>

                fontFamily:"'DM Sans',sans-serif",fontSize:12,

            </div>

                <button onClick={sauvegarderNote} style={{
                  width:"100%",padding:"10px",borderRadius:10,border:"none",

                  color:"#fff",fontWeight:700,fontFamily:"'DM Sans',sans-serif",fontSize:14,cursor:"pointer",

              <div style={{marginTop:10,fontSize:13,color:C.sub,fontFamily:"'DM Sans',sans-serif",lineHeight:1.6,fontStyle:"italic"}}>

          {/* ── Accords ── */}
          <div style={{background:C.card2,borderRadius:12,padding:"14px 16px",marginBottom:16}}>

          {histo.length>0&&(
            <div style={{background:C.card2,borderRadius:12,padding:"14px 16px",marginBottom:16}}>
