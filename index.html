                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:2}}>
                      <span style={{fontSize:13,fontWeight:600,color:C.text,fontFamily:"'DM Sans',sans-serif"}}>
                        {h.qte} bouteille{h.qte>1?"s":""}
                      </span>
                      <span style={{fontSize:11,color:C.sub2,fontFamily:"'DM Sans',sans-serif"}}>{h.date}</span>
                    </div>
                    {h.note>0&&<Etoiles note={h.note}/>}
                    {h.commentaire&&<div style={{fontSize:12,color:C.sub,fontFamily:"'DM Sans',sans-serif",fontStyle:"italic",marginTop:4}}>"{h.commentaire}"</div>}
                  </div>
                </div>
              ))}
              {histo.length>5&&<div style={{fontSize:11,color:C.sub2,textAlign:"center",fontFamily:"'DM Sans',sans-serif"}}>{histo.length-5} consommation{histo.length-5>1?"s":""} de plus…</div>}
            </div>
          )}

          {/* ── Actions ── */}
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>onEdit(vin)} style={{flex:1,padding:"12px",borderRadius:12,border:`1px solid ${C.border}`,background:"transparent",color:C.text,fontFamily:"'DM Sans',sans-serif",fontSize:14,fontWeight:600,cursor:"pointer"}}>✏️ Modifier</button>
            <button onClick={()=>setConfirmSuppr(true)} style={{padding:"12px 16px",borderRadius:12,border:`1px solid #c0392b44`,background:"#c0392b18",color:"#c0392b",fontFamily:"'DM Sans',sans-serif",fontSize:14,cursor:"pointer"}}>🗑</button>
          </div>
        </div>
      </div>
    </div>
  );
  return(
    <>
      {sheet}
      {confirmSuppr&&(
        <ModalConfirm
          titre="Supprimer ce vin ?"
          message={`"${vin.nom}" sera définitivement retiré de votre cave. Cette action est irréversible.`}
          labelOk="Supprimer"
          danger={true}
          onOk={()=>onDelete(vin.id)}
          onAnnuler={()=>setConfirmSuppr(false)}
        />
      )}
    </>
  );
}

// ── Page Ajouter / Modifier ────────────────────────────────────────────────────
function PageForm({initial,groupes,regions,bouteilles,onSave,onBack}){
  const [f,setF]=useState(()=>{
    const base = initial||{
      nom:"",domaine:"",region:regions[0]||"Bordeaux",type:"Rouge",
      millesime:"",prix:"",emplacement:"",quantite:1,
      volume:"75 cl", rackSlots:[],
      groupeId:groupes[0]?.id||"",
    };
    if(base.rackSlot&&!base.rackSlots?.length){
      return {...base, rackSlots:[base.rackSlot], rackSlot:undefined};
    }
    if(!base.rackSlots) return {...base, rackSlots:[]};
    return base;
  });
  const [showRackPicker,setShowRackPicker]=useState(false);
  const [scanning,    setScanning]    = useState(false);   // caméra active
  const [scanError,   setScanError]   = useState(null);
  const [scanSuccess, setScanSuccess] = useState(null);
  const videoRef    = useRef(null);
  const canvasRef   = useRef(null);
  const streamRef   = useRef(null);
  const readerRef   = useRef(null);
  const animRef     = useRef(null);

  const s=(k,v)=>setF(x=>({...x,[k]:v}));

  // ── Mapper catégories Open Food Facts → nos régions/types ──
  const mapRegion = (categories="", labels="", origins="") => {
    const txt = (categories+labels+origins).toLowerCase();
    if(/bordeaux/.test(txt))    return "Bordeaux";
    if(/bourgogne|burgundy/.test(txt)) return "Bourgogne";
    if(/champagne/.test(txt))   return "Champagne";
    if(/alsace/.test(txt))      return "Alsace";
    if(/rh[oô]ne/.test(txt))    return "Rhône";
    if(/loire/.test(txt))       return "Loire";
    if(/languedoc|roussillon/.test(txt)) return "Languedoc";
    if(/provence/.test(txt))    return "Provence";
    if(/jura/.test(txt))        return "Jura";
    if(/savoie/.test(txt))      return "Savoie";
    if(/sud.?ouest|gascogne|cahors|bergerac/.test(txt)) return "Sud-Ouest";
    if(/itali/.test(txt))       return "Italie";
    if(/espagne|spain|rioja|ribera/.test(txt)) return "Espagne";
    if(/australi|chili|argentin|afrique.?du.?sud|usa|californi|nouvelle.?z/.test(txt)) return "Nouveau Monde";
    if(/france|french/.test(txt)) return "Autre";
    return null;
  };
  const mapType = (categories="") => {
    const txt = categories.toLowerCase();
    if(/effervescen|sparkling|champagne|cr[eé]mant|prosecco|cava/.test(txt)) return "Effervescent";
    if(/ros[eé]/.test(txt))    return "Rosé";
    if(/blanc|white/.test(txt)) return "Blanc";
    if(/liquoreux|sweet|sauternes|monbazillac/.test(txt)) return "Liquoreux";
    if(/rouge|red/.test(txt))   return "Rouge";
    return null;
  };

  // ── Fermer la caméra proprement ──
  const closeCamera = () => {
    if(animRef.current)  cancelAnimationFrame(animRef.current);
    if(streamRef.current) streamRef.current.getTracks().forEach(t=>t.stop());
    streamRef.current = null;
    readerRef.current = null;
    setScanning(false);
  };

  // ── Interroger Open Food Facts avec le code-barres ──
  const fetchWineInfo = async (barcode) => {
    closeCamera();
    setScanning(false);
    setScanError(null);
    setScanSuccess("Code-barres détecté : " + barcode + " — Recherche…");
    try {
      const res = await fetch(
        `https://world.openfoodfacts.org/api/v0/product/${barcode}.json`
      );
      const data = await res.json();
      if(data.status !== 1 || !data.product) {
        setScanSuccess(null);
        setScanError("Vin non trouvé dans la base. Remplissez manuellement.");
        return;
      }
      const p = data.product;
      const name      = p.product_name_fr || p.product_name || "";
      const brand     = p.brands || "";
      const categories= p.categories || "";
      const labels    = p.labels || "";
      const origins   = p.origins || "";
      const quantity  = p.quantity || "";

      // Extraire le millésime (4 chiffres entre 1900 et 2100)
      const yearMatch = (name+" "+labels+" "+(p.generic_name||"")).match(/\b(19[5-9]\d|20[0-3]\d)\b/);
      const millesime = yearMatch ? yearMatch[1] : "";

      const region = mapRegion(categories, labels, origins);
      const type   = mapType(categories);

      // Nom propre : enlever le millésime et la marque du nom si déjà dans domaine
      let nom = name.replace(/\b(19|20)\d{2}\b/g,"").trim();
      if(brand && nom.toLowerCase().startsWith(brand.toLowerCase())) {
        nom = nom.slice(brand.length).trim();
      }

      setF(prev=>({
        ...prev,
        nom:       nom || prev.nom,
        domaine:   brand || prev.domaine,
        millesime: millesime || prev.millesime,
        region:    region && regions.includes(region) ? region : prev.region,
        type:      type || prev.type,
      }));
      setScanSuccess(`✓ "${nom || name}" trouvé !`);
      setTimeout(()=>setScanSuccess(null), 3000);
    } catch(err) {
      setScanSuccess(null);
      setScanError("Erreur réseau. Vérifiez votre connexion.");
    }
  };

  // ── Démarrer le scanner caméra avec ZXing ──
  const startScan = async () => {
    setScanError(null);
    setScanSuccess(null);
    setScanning(true);
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video:{ facingMode:"environment", width:{ideal:1280}, height:{ideal:720} }
      });
      streamRef.current = stream;
      if(videoRef.current){
        videoRef.current.srcObject = stream;
        await videoRef.current.play();
      }
      // Charger ZXing dynamiquement
      if(!window.ZXing){
        await new Promise((res,rej)=>{
          const sc = document.createElement("script");
          sc.src = "https://cdn.jsdelivr.net/npm/@zxing/library@0.21.3/umd/index.min.js";
          sc.onload = res; sc.onerror = rej;
          document.head.appendChild(sc);
        });
      }
      const hints = new Map();
      const formats = [
        window.ZXing.BarcodeFormat.EAN_13,
        window.ZXing.BarcodeFormat.EAN_8,
        window.ZXing.BarcodeFormat.UPC_A,
        window.ZXing.BarcodeFormat.UPC_E,
        window.ZXing.BarcodeFormat.CODE_128,
      ];
      hints.set(window.ZXing.DecodeHintType.POSSIBLE_FORMATS, formats);
      const reader = new window.ZXing.MultiFormatReader();
      reader.setHints(hints);
      readerRef.current = reader;

      // Boucle de décodage sur chaque frame
      const decode = () => {
        if(!readerRef.current || !videoRef.current || !canvasRef.current) return;
        const video  = videoRef.current;
        const canvas = canvasRef.current;
        if(video.readyState !== video.HAVE_ENOUGH_DATA){
          animRef.current = requestAnimationFrame(decode); return;
        }
        canvas.width  = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(video, 0, 0);
        try {
          const imgData = ctx.getImageData(0,0,canvas.width,canvas.height);
          const lum     = new window.ZXing.RGBLuminanceSource(
            imgData.data, canvas.width, canvas.height
          );
          const bmp     = new window.ZXing.BinaryBitmap(
            new window.ZXing.HybridBinarizer(lum)
          );
          const result  = readerRef.current.decode(bmp);
          if(result) { fetchWineInfo(result.getText()); return; }
        } catch(e){ /* pas encore de code-barres */ }
        animRef.current = requestAnimationFrame(decode);
      };
      animRef.current = requestAnimationFrame(decode);
    } catch(err) {
      closeCamera();
      setScanError("Impossible d'accéder à la caméra. Autorisez l'accès dans les réglages.");
    }
  };

  useEffect(()=>{ return ()=>closeCamera(); }, []);
  const G2={display:"grid",gridTemplateColumns:"1fr 1fr",gap:12};
  const FLD={marginBottom:16};
  const g=getGarde(f.region,f.type,f.millesime);
  const grp=groupes.find(x=>x.id===f.groupeId);
  const hasRacks=grp&&grp.racks&&grp.racks.length>0;
  // Rack sélectionné (premier par défaut si pas encore choisi)
  const currentRack = grp?.racks?.find(r=>r.id===f.rackId)||grp?.racks?.[0]||null;

  return (
    <div style={{paddingBottom:100}}>

      {/* ── Overlay caméra ── */}
      {scanning&&(
        <div style={{
          position:"fixed",inset:0,background:"#000",zIndex:500,
          display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
        }}>
          <video ref={videoRef} playsInline muted
            style={{width:"100%",maxWidth:480,borderRadius:0,objectFit:"cover",height:"70vh"}}/>
          <canvas ref={canvasRef} style={{display:"none"}}/>

          {/* Viseur central */}
          <div style={{
            position:"absolute",top:"50%",left:"50%",
            transform:"translate(-50%,-60%)",
            width:260,height:120,
            border:"2px solid #27ae60",borderRadius:8,
            boxShadow:"0 0 0 9999px rgba(0,0,0,0.55)",
          }}>
            {/* Coins animés */}
            {[["0%","0%","top","left"],["100%","0%","top","right"],
              ["0%","100%","bottom","left"],["100%","100%","bottom","right"]].map(([x,y,v,h])=>(
              <div key={v+h} style={{
                position:"absolute",[v]:-2,[h]:-2,
                width:20,height:20,
                borderTop: v==="top"?"3px solid #27ae60":"none",
                borderBottom: v==="bottom"?"3px solid #27ae60":"none",
                borderLeft: h==="left"?"3px solid #27ae60":"none",
                borderRight: h==="right"?"3px solid #27ae60":"none",
              }}/>
            ))}
            {/* Ligne scan animée */}
            <div style={{
              position:"absolute",left:4,right:4,
              height:2,background:"#27ae60",opacity:0.8,
              top:"50%",transform:"translateY(-50%)",
              animation:"scanLine 1.5s ease-in-out infinite",
            }}/>
          </div>

          <style>{`
            @keyframes scanLine {
              0%,100% { top:10%; }
              50% { top:85%; }
            }
          `}</style>

          <div style={{
            position:"absolute",bottom:"20%",left:0,right:0,
            textAlign:"center",color:"#fff",
            fontFamily:"'DM Sans',sans-serif",fontSize:15,fontWeight:600,
          }}>
            Pointez le code-barres de la bouteille
          </div>

          <button onClick={closeCamera} style={{
            position:"absolute",bottom:"8%",
            padding:"12px 32px",borderRadius:12,border:"none",
            background:"#c0392b",color:"#fff",
            fontFamily:"'DM Sans',sans-serif",fontSize:14,fontWeight:700,cursor:"pointer",
          }}>Annuler</button>
        </div>
      )}

      {/* Header */}
      <div style={{padding:"16px 16px 0",display:"flex",alignItems:"center",gap:12,marginBottom:20}}>
        <button onClick={onBack} style={{width:36,height:36,borderRadius:10,background:C.card,border:`1px solid ${C.border}`,color:C.text,cursor:"pointer",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>←</button>
        <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:22,color:C.text,margin:0,fontWeight:700,flex:1}}>
          {initial?.id?"Modifier le vin":"Ajouter un vin"}
        </h1>
        {!initial?.id&&(
          <button onClick={startScan} style={{
            display:"flex",alignItems:"center",gap:6,
            padding:"8px 12px",borderRadius:10,border:"none",
            background:"linear-gradient(135deg,#1a3a20,#27ae60)",
            color:"#fff",cursor:"pointer",
            fontFamily:"'DM Sans',sans-serif",fontSize:12,fontWeight:700,flexShrink:0,
          }}>
            📷 Scanner
          </button>
        )}
      </div>

      {/* Messages feedback */}
      {scanError&&(
        <div style={{margin:"0 16px 14px",padding:"11px 14px",background:"#c0392b18",border:"1px solid #c0392b44",borderRadius:10,fontSize:13,color:"#e74c3c",fontFamily:"'DM Sans',sans-serif",display:"flex",alignItems:"center",gap:8}}>
          ⚠ {scanError}
          <button onClick={()=>setScanError(null)} style={{marginLeft:"auto",background:"none",border:"none",color:"#e74c3c",cursor:"pointer",fontSize:16}}>✕</button>
        </div>
      )}
      {scanSuccess&&(
        <div style={{margin:"0 16px 14px",padding:"11px 14px",background:"#27ae6018",border:"1px solid #27ae6044",borderRadius:10,fontSize:13,color:"#27ae60",fontFamily:"'DM Sans',sans-serif"}}>
          {scanSuccess}
        </div>
      )}

      <div style={{padding:"0 16px"}}>
        {/* Type selector visuel */}
        <div style={FLD}>
          <Lbl>Type de vin</Lbl>
          <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:4}}>
            {TYPES.map(t=>(
              <button key={t} onClick={()=>s("type",t)} style={{
                ...pill(f.type===t,TYPE_COLOR[t]),flexShrink:0,
              }}><Dot type={t} size={8}/> {t}</button>
            ))}
          </div>
        </div>

        <div style={FLD}><Lbl>Nom / Cuvée *</Lbl><Input value={f.nom} onChange={e=>s("nom",e.target.value)} placeholder="Ex: Gevrey-Chambertin, Château Pétrus…"/></div>
        <div style={FLD}><Lbl>Domaine / Producteur</Lbl><Input value={f.domaine} onChange={e=>s("domaine",e.target.value)} placeholder="Ex: Domaine Leflaive…"/></div>

        <div style={{...G2,...FLD}}>
          <div><Lbl>Région</Lbl><Select value={f.region} onChange={e=>s("region",e.target.value)}>{regions.map(r=><option key={r}>{r}</option>)}</Select></div>
          <div><Lbl>Millésime</Lbl><Input type="number" value={f.millesime} onChange={e=>s("millesime",e.target.value?parseInt(e.target.value):"")} placeholder="Année" min={1950} max={2026}/></div>
        </div>

        <div style={{...G2,...FLD}}>
          <div><Lbl>Prix (€)</Lbl><Input type="number" value={f.prix} onChange={e=>s("prix",e.target.value?parseFloat(e.target.value):"")} placeholder="€"/></div>
          <div><Lbl>Quantité</Lbl><Input type="number" value={f.quantite} onChange={e=>s("quantite",parseInt(e.target.value)||0)}/></div>
        </div>

        <div style={FLD}><Lbl>Volume de la bouteille</Lbl>
          <div style={{display:"flex",gap:8}}>
            {VOLUMES.map(v=>(
              <button key={v} onClick={()=>s("volume",v)} style={{
                flex:1,padding:"10px 4px",borderRadius:10,
                border:`1px solid ${f.volume===v?C.accent:C.border}`,
                background:f.volume===v?C.accent+"22":C.card2,
                color:f.volume===v?C.accent:C.sub,
                fontFamily:"'DM Sans',sans-serif",fontSize:13,fontWeight:f.volume===v?700:400,
                cursor:"pointer",transition:"all 0.15s",
              }}>{v}</button>
            ))}
          </div>
        </div>

        <div style={FLD}><Lbl>Lieu de rangement</Lbl>
          <Select value={f.groupeId} onChange={e=>s("groupeId",e.target.value)}>
            {groupes.map(g=><option key={g.id} value={g.id}>{g.nom}</option>)}
          </Select>
        </div>

        {/* Localisation dans le rack */}
        {hasRacks&&(
          <div style={FLD}>
            <Lbl>📍 Emplacement dans le rack</Lbl>

            {/* Sélecteur de rack si plusieurs */}
            {grp.racks.length>1&&(
              <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}}>
                {grp.racks.map(r=>(
                  <button key={r.id} onClick={()=>{s("rackId",r.id);s("rackSlots",[]);}} style={{
                    padding:"5px 12px",borderRadius:8,fontSize:12,fontWeight:600,
                    border:`1px solid ${f.rackId===r.id?"#f39c12":C.border}`,
                    background:f.rackId===r.id?"#f39c1222":C.card2,
                    color:f.rackId===r.id?"#f39c12":C.sub,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",
                  }}>{r.storageType==="frigo"?"❄":"🗄"} {r.nom}</button>
                ))}
              </div>
            )}

            <div style={{fontSize:12,color:C.sub,fontFamily:"'DM Sans',sans-serif",marginBottom:8}}>
              {f.quantite<=1?"Sélectionnez 1 case pour votre bouteille"
                :`Sélectionnez ${f.quantite} cases — une par bouteille (${f.rackSlots.length}/${f.quantite})`}
            </div>

            {f.rackSlots.length>0&&(
              <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}}>
                {f.rackSlots.map((slot,i)=>(
                  <div key={slot} style={{display:"flex",alignItems:"center",gap:5,background:"#f39c1222",border:"1px solid #f39c1444",borderRadius:8,padding:"4px 10px"}}>
                    {f.rackSlots.length>1&&<span style={{fontSize:10,color:"#f39c1299"}}>#{i+1}</span>}
                    <span style={{fontSize:14,fontWeight:700,color:"#f39c12",fontFamily:"monospace",letterSpacing:1}}>{slot}</span>
                    <button onClick={()=>setF(x=>({...x,rackSlots:x.rackSlots.filter(ss=>ss!==slot)}))} style={{background:"none",border:"none",color:"#f39c1280",cursor:"pointer",fontSize:13}}>✕</button>
                  </div>
                ))}
                <button onClick={()=>setF(x=>({...x,rackSlots:[]}))} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:8,padding:"4px 10px",color:C.sub2,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontSize:12}}>Tout effacer</button>
              </div>
            )}

            <button onClick={()=>setShowRackPicker(v=>!v)} style={{
              width:"100%",padding:"10px 14px",borderRadius:10,
              border:`1px solid ${f.rackSlots.length>0?"#f39c1444":C.border}`,
              background:f.rackSlots.length>0?"#f39c1210":C.card2,
              color:f.rackSlots.length>0?"#f39c12":C.sub,
              fontFamily:"'DM Sans',sans-serif",fontSize:13,fontWeight:600,
              cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:8,
            }}>
              <span>{currentRack?.storageType==="frigo"?"❄":"🗄"}</span>
              <span>{f.rackSlots.length===0?"Cliquer pour placer les bouteilles":f.rackSlots.length>=f.quantite?"✓ Tous les emplacements définis":`Encore ${f.quantite-f.rackSlots.length} case${f.quantite-f.rackSlots.length>1?"s":""} à choisir`}</span>
              <span style={{marginLeft:"auto",fontSize:16}}>{showRackPicker?"▲":"▼"}</span>
            </button>

            {showRackPicker&&currentRack&&(
              <div style={{background:C.bg,borderRadius:12,padding:12,marginTop:8,border:`1px solid ${C.border}`,overflowX:"auto"}}>
                <StorageSVG
                  storageType={currentRack.storageType||"rack"}
                  rangees={currentRack.rangees}
                  colonnes={currentRack.colonnes}
                  highlightSlots={f.rackSlots}
                  occupiedSlots={bouteilles
                    .filter(b=>b.id!==f.id && (b.rackId===currentRack.id||((!b.rackId)&&grp?.racks?.[0]?.id===currentRack.id)))
                    .flatMap(b=>{
                      const slots=Array.isArray(b.rackSlots)?b.rackSlots:(b.rackSlot?[b.rackSlot]:[]);
                      return slots.map(s=>({slot:s, type:b.type, nom:b.nom}));
                    })}
                  onSelect={slot=>{
                    setF(x=>{
                      if(x.rackSlots.includes(slot)) return {...x,rackSlots:x.rackSlots.filter(ss=>ss!==slot)};
                      if(x.rackSlots.length>=x.quantite) return {...x,rackSlots:[...x.rackSlots.slice(1),slot]};
                      return {...x,rackSlots:[...x.rackSlots,slot]};
                    });
                    if(f.rackSlots.length+1>=f.quantite&&!f.rackSlots.includes(slot)) setShowRackPicker(false);
                  }}
                  mode="pick" maxW={340}/>
                <div style={{fontSize:10,color:C.sub2,fontFamily:"'DM Sans',sans-serif",marginTop:6}}>
                  Cases colorées = déjà occupées · Cliquer pour sélectionner
                </div>
              </div>
            )}
          </div>
        )}

        {/* Aperçu sommelier */}
        {f.region&&f.type&&(
          <div style={{background:C.card2,borderRadius:14,padding:"14px 16px",marginBottom:20,border:`1px solid ${C.border}`}}>
            <div style={{fontSize:11,color:C.accent,letterSpacing:1,textTransform:"uppercase",fontFamily:"'DM Sans',sans-serif",marginBottom:8,fontWeight:600}}>✦ Avis sommelier</div>
            <div style={{fontSize:13,color:C.sub,fontFamily:"'DM Sans',sans-serif",lineHeight:1.6,marginBottom:8}}>
              {g.statut==="?"?`Garde estimée : ${g.min}–${g.max} ans`:`Apogée vers ${f.millesime?f.millesime+g.peak:g.peak+" ans après récolte"}`}
            </div>
            <div style={{fontSize:12,color:C.sub2,fontFamily:"'DM Sans',sans-serif"}}>🍽 {getAccord(f.region,f.type)}</div>
          </div>
        )}

        <button onClick={()=>{if(f.nom.trim())onSave(f);}} style={{
          width:"100%",padding:"15px",borderRadius:14,border:"none",
          background:`linear-gradient(135deg,${C.accent},${C.accentL})`,
          color:"#fff",fontWeight:700,fontFamily:"'DM Sans',sans-serif",
          fontSize:16,cursor:"pointer",
          boxShadow:`0 8px 24px ${C.accent}40`,
        }}>
          {initial?.id?"Enregistrer les modifications":"Ajouter à la cave"}
        </button>
      </div>
    </div>
  );
}

// ── Page Consommer ─────────────────────────────────────────────────────────────
function PageConsommer({bouteilles, groupes, onConsommer, onBack}){
  const [search,    setSearch]    = useState("");
  const [selected,  setSelected]  = useState(null);
  const [qte,       setQte]       = useState(1);
  const [slotsChoisis, setSlotsChoisis] = useState([]);
  const [noteConsomm,  setNoteConsomm]  = useState(0);
  const [commentConsomm, setCommentConsomm] = useState("");

  const stock   = bouteilles.filter(b=>b.quantite>0);
  const results = stock
    .filter(b=>!search
      ||b.nom.toLowerCase().includes(search.toLowerCase())
      ||(b.domaine||"").toLowerCase().includes(search.toLowerCase())
      ||String(b.millesime).includes(search))
    .sort((a,b)=>a.type.localeCompare(b.type)||a.nom.localeCompare(b.nom));

  const selectBouteille = b => {
    if(selected?.id===b.id){ setSelected(null); setQte(1); setSlotsChoisis([]); setNoteConsomm(0); setCommentConsomm(""); return; }
    setSelected(b); setQte(1); setSlotsChoisis([]); setNoteConsomm(0); setCommentConsomm("");
  };

  const changeQte = delta => {
    const nouveau = Math.min(selected.quantite, Math.max(1, qte+delta));
    setQte(nouveau);
    // Réduire les slots si on diminue la quantité
    if(nouveau < slotsChoisis.length) setSlotsChoisis(s=>s.slice(0, nouveau));
  };

  // Groupe et rack de la bouteille sélectionnée — déclaré AVANT toggleSlot et peutConfirmer
  const grpSel      = selected ? groupes.find(g=>g.id===selected.groupeId) : null;
  const rackSel = grpSel?.racks?.find(r=>r.id===selected?.rackId)||grpSel?.racks?.[0]||null;
  const existingSlots = selected
    ? (Array.isArray(selected.rackSlots)?selected.rackSlots:(selected.rackSlot?[selected.rackSlot]:[])) 
    : [];
  const hasRack = rackSel && existingSlots.length>0;

  const toggleSlot = slot => {
    // On ne peut sélectionner que des cases occupées par CE vin
    if(!existingSlots.includes(slot)) return;
    setSlotsChoisis(prev=>{
      if(prev.includes(slot)) return prev.filter(s=>s!==slot);
      if(prev.length>=qte) return [...prev.slice(1), slot];
      return [...prev, slot];
    });
  };

  const peutConfirmer = !hasRack || slotsChoisis.length === qte;

  const confirmer = () => {
    onConsommer(selected, qte, slotsChoisis, noteConsomm, commentConsomm);
    setSelected(null); setSearch(""); setQte(1); setSlotsChoisis([]); setNoteConsomm(0); setCommentConsomm("");
  };

  const BouteilleLigne = ({b, onClick}) => (
    <div onClick={onClick} style={{
      background: selected?.id===b.id ? C.card2 : C.card,
      borderRadius:12, padding:"12px 16px", cursor:"pointer",
      display:"flex", alignItems:"center", gap:12,
      border:`1px solid ${selected?.id===b.id?C.accent:C.border}`,
      transition:"all 0.15s"
    }}
      onMouseEnter={e=>{if(selected?.id!==b.id)e.currentTarget.style.background=C.card2;}}
      onMouseLeave={e=>{if(selected?.id!==b.id)e.currentTarget.style.background=C.card;}}>
      <div style={{width:36,height:36,borderRadius:10,background:TYPE_COLOR[b.type]+"18",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
        <Dot type={b.type} size={12}/>
      </div>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:14,fontWeight:600,color:C.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
          {b.nom}{b.millesime&&<span style={{color:C.sub,fontWeight:400,fontSize:13,marginLeft:6}}>{b.millesime}</span>}
        </div>
        {b.domaine&&<div style={{fontSize:12,color:C.sub,fontStyle:"italic",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{b.domaine}</div>}
        <div style={{fontSize:11,color:C.sub2}}>{b.region}</div>
      </div>
      <div style={{
        background:b.quantite<=2?"#f39c1222":"#27ae6022",
        color:b.quantite<=2?"#f39c12":"#27ae60",
        borderRadius:8, padding:"3px 10px", fontSize:13, fontWeight:700,
        fontFamily:"'DM Sans',sans-serif", flexShrink:0,
      }}>{b.quantite} btl</div>
    </div>
  );

  return (
    <div style={{paddingBottom:100}}>
      {/* Header */}
      <div style={{padding:"16px 16px 0",display:"flex",alignItems:"center",gap:12,marginBottom:20}}>
        <button onClick={onBack} style={{width:36,height:36,borderRadius:10,background:C.card,border:`1px solid ${C.border}`,color:C.text,cursor:"pointer",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>←</button>
        <div>
          <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:22,color:C.text,margin:0,fontWeight:700}}>Consommer</h1>
          <div style={{fontSize:12,color:C.sub,fontFamily:"'DM Sans',sans-serif"}}>{stock.length} bouteille{stock.length!==1?"s":""} disponible{stock.length!==1?"s":""}</div>
        </div>
      </div>

      <div style={{padding:"0 16px"}}>
        {/* Recherche */}
        <div style={{position:"relative",marginBottom:14}}>
          <span style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)",color:C.sub2,fontSize:15}}>🔍</span>
          <input value={search} onChange={e=>{setSearch(e.target.value);setSelected(null);setQte(1);setSlotsChoisis([]);}}
            placeholder="Filtrer par nom, domaine, millésime…"
            style={{width:"100%",background:C.card,border:`1px solid ${C.border}`,borderRadius:12,
              padding:"10px 14px 10px 40px",color:C.text,fontSize:13,
              fontFamily:"'DM Sans',sans-serif",outline:"none",boxSizing:"border-box"}}/>
          {search&&<button onClick={()=>{setSearch("");setSelected(null);}} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:C.sub2,cursor:"pointer",fontSize:16}}>✕</button>}
        </div>

        {stock.length===0?(
          <div style={{textAlign:"center",padding:"60px 0",color:C.sub2}}>
            <div style={{fontSize:48,marginBottom:12}}>🍾</div>
            <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:14}}>Aucune bouteille en stock</div>
          </div>
        ):(
          <>
            {results.length===0&&search?(
              <div style={{textAlign:"center",padding:"24px 0",color:C.sub2,fontFamily:"'DM Sans',sans-serif",fontSize:13}}>Aucun résultat pour "{search}"</div>
            ):(
              <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:selected?16:0}}>
                {results.map(b=><BouteilleLigne key={b.id} b={b} onClick={()=>selectBouteille(b)}/>)}
              </div>
            )}

            {/* Panel confirmation */}
            {selected&&(
              <div style={{background:C.card,borderRadius:16,padding:"18px",border:`1px solid ${C.accent}44`}}>

                {/* Identité */}
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16,paddingBottom:14,borderBottom:`1px solid ${C.border}`}}>
                  <div style={{width:40,height:40,borderRadius:10,background:TYPE_COLOR[selected.type]+"22",display:"flex",alignItems:"center",justifyContent:"center"}}>
                    <Dot type={selected.type} size={14}/>
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:15,fontWeight:700,color:C.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{selected.nom}</div>
                    <div style={{fontSize:12,color:C.sub}}>{selected.millesime&&`${selected.millesime} · `}{selected.region}</div>
                  </div>
                  <button onClick={()=>{setSelected(null);setQte(1);setSlotsChoisis([]);}}
                    style={{background:C.card2,border:"none",borderRadius:8,width:30,height:30,color:C.sub,cursor:"pointer",fontSize:15}}>✕</button>
                </div>

                {/* Quantité */}
                <div style={{fontSize:10,color:C.sub2,letterSpacing:1.2,textTransform:"uppercase",fontFamily:"'DM Sans',sans-serif",marginBottom:10,fontWeight:600}}>Quantité à consommer</div>
                <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:16,justifyContent:"center"}}>
                  <button onClick={()=>changeQte(-1)} style={{width:44,height:44,borderRadius:12,border:`1px solid ${C.border}`,background:C.card2,color:C.text,cursor:"pointer",fontSize:22}}>−</button>
                  <div style={{textAlign:"center"}}>
                    <div style={{fontFamily:"'Playfair Display',serif",fontSize:40,color:C.text,fontWeight:700,lineHeight:1}}>{qte}</div>
                    <div style={{fontSize:12,color:C.sub,fontFamily:"'DM Sans',sans-serif",marginTop:2}}>sur {selected.quantite} en stock</div>
                  </div>
                  <button onClick={()=>changeQte(+1)} style={{width:44,height:44,borderRadius:12,border:`1px solid ${C.border}`,background:C.card2,color:C.text,cursor:"pointer",fontSize:22}}>+</button>
                </div>

                {/* ── Sélection sur le rack ── */}
                {hasRack&&(
                  <div style={{background:C.card2,borderRadius:12,padding:"14px",marginBottom:14,border:`1px solid ${C.border}`}}>
                    <div style={{fontSize:10,color:C.sub2,letterSpacing:1.2,textTransform:"uppercase",fontFamily:"'DM Sans',sans-serif",marginBottom:6,fontWeight:600}}>
                      🗄 Choisir les bouteilles à retirer
                    </div>
                    <div style={{fontSize:12,color:slotsChoisis.length>=qte?"#27ae60":C.sub,fontFamily:"'DM Sans',sans-serif",marginBottom:10}}>
                      {slotsChoisis.length>=qte
                        ? `✓ ${qte} case${qte>1?"s":""} sélectionnée${qte>1?"s":""}`
                        : `Sélectionnez ${qte} case${qte>1?"s":""} à vider — ${slotsChoisis.length}/${qte} choisie${slotsChoisis.length>1?"s":""}`
                      }
                    </div>

                    {/* Badges des cases choisies */}
                    {slotsChoisis.length>0&&(
                      <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}}>
                        {slotsChoisis.map((slot,i)=>(
                          <div key={slot} style={{display:"flex",alignItems:"center",gap:4,background:"#c0392b22",border:"1px solid #c0392b44",borderRadius:7,padding:"3px 9px"}}>
                            {slotsChoisis.length>1&&<span style={{fontSize:9,color:"#c0392b99"}}>#{i+1}</span>}
                            <span style={{fontSize:13,fontWeight:700,color:"#e74c3c",fontFamily:"monospace",letterSpacing:1}}>{slot}</span>
                            <button onClick={()=>setSlotsChoisis(s=>s.filter(x=>x!==slot))}
                              style={{background:"none",border:"none",color:"#c0392b80",cursor:"pointer",fontSize:12}}>✕</button>
                          </div>
                        ))}
                      </div>
                    )}

                    {/* Rack/Frigo interactif — uniquement les cases de ce vin sont cliquables */}
                    <div style={{overflowX:"auto"}}>
                      <StorageSVG
                        storageType={rackSel?.storageType||"rack"}
                        rangees={rackSel?.rangees||9}
                        colonnes={rackSel?.colonnes||7}
                        highlightSlots={slotsChoisis}
                        occupiedSlots={existingSlots.map(s=>({slot:s, type:selected.type}))}
                        selectableSlots={existingSlots}
                        onSelect={toggleSlot}
                        mode="pick"
                        maxW={340}
                      />
                    </div>
                    <div style={{fontSize:10,color:C.sub2,fontFamily:"'DM Sans',sans-serif",marginTop:6}}>
                      Cliquez uniquement sur les bouteilles colorées · Rouge = sélectionnée pour retrait
                    </div>
                  </div>
                )}

                {/* Alerte suppression totale */}
                {qte>=selected.quantite&&(
                  <div style={{background:"#c0392b18",borderRadius:10,padding:"10px 14px",marginBottom:12,fontSize:12,color:"#e74c3c",fontFamily:"'DM Sans',sans-serif",textAlign:"center"}}>
                    ⚠ Toutes les bouteilles seront consommées — le vin sera retiré de la cave
                  </div>
                )}

                {/* Avertissement si rack défini mais cases pas toutes choisies */}
                {hasRack&&!peutConfirmer&&(
                  <div style={{background:"#f39c1218",borderRadius:10,padding:"10px 14px",marginBottom:12,fontSize:12,color:"#f39c12",fontFamily:"'DM Sans',sans-serif",textAlign:"center"}}>
                    Sélectionnez encore {qte-slotsChoisis.length} bouteille{qte-slotsChoisis.length>1?"s":""} sur le rack
                  </div>
                )}

                {/* Note optionnelle */}
                <div style={{background:C.card2,borderRadius:12,padding:"12px 14px",marginBottom:12}}>
                  <div style={{fontSize:10,color:C.sub2,letterSpacing:1.2,textTransform:"uppercase",fontFamily:"'DM Sans',sans-serif",marginBottom:8,fontWeight:600}}>Note de dégustation (optionnel)</div>
                  <div style={{marginBottom:8}}><Etoiles note={noteConsomm} onChange={setNoteConsomm}/></div>
                  <textarea value={commentConsomm} onChange={e=>setCommentConsomm(e.target.value)}
                    placeholder="Occasion, arômes, impressions…" rows={2}
                    style={{width:"100%",background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,
                      padding:"8px 10px",color:C.text,fontSize:12,fontFamily:"'DM Sans',sans-serif",
                      outline:"none",resize:"none",boxSizing:"border-box"}}/>
                </div>

                <button onClick={peutConfirmer?confirmer:null} style={{
                  width:"100%",padding:"14px",borderRadius:12,border:"none",
                  background:peutConfirmer?"linear-gradient(135deg,#8b1414,#c0392b)":"#2a1a1a",
                  color:peutConfirmer?"#fff":"#5a3030",fontWeight:700,fontFamily:"'DM Sans',sans-serif",
                  fontSize:15,cursor:peutConfirmer?"pointer":"not-allowed",
                  boxShadow:peutConfirmer?"0 8px 24px rgba(192,57,43,0.35)":"none",
                  transition:"all 0.2s",
                }}>
                  🍷 Confirmer — {qte} bouteille{qte>1?"s":""}
                  {hasRack&&slotsChoisis.length>0&&` · Cases ${slotsChoisis.join(", ")}`}
                </button>
              </div>
            )}
          </>
        )}
      </div>
    </div>
  );
}

// ── Page Historique ────────────────────────────────────────────────────────────
function PageHistorique({historique, onBack}){
  const [search, setSearch] = useState("");
  const [sortBy, setSortBy] = useState("date"); // date | note | region
  const [filterNote, setFilterNote] = useState(0); // 0 = tous

  const sorted = [...(historique||[])]
    .filter(h=>!search||(h.nomVin+h.domaine+h.region).toLowerCase().includes(search.toLowerCase()))
    .filter(h=>filterNote===0||h.note>=filterNote)
    .sort((a,b)=>{
      if(sortBy==="note") return (b.note||0)-(a.note||0);
      if(sortBy==="region") return (a.region||"").localeCompare(b.region||"");
      return b.date.split("/").reverse().join("-").localeCompare(a.date.split("/").reverse().join("-"));
    });

  const totalBtl = (historique||[]).reduce((s,h)=>s+h.qte, 0);
  const avgNote  = historique?.filter(h=>h.note>0).length
    ? (historique.filter(h=>h.note>0).reduce((s,h)=>s+h.note,0)/historique.filter(h=>h.note>0).length).toFixed(1)
    : null;

  return (
    <div style={{paddingBottom:80}}>
      <div style={{padding:"16px 16px 14px",display:"flex",alignItems:"center",gap:12}}>
        <button onClick={onBack} style={{width:36,height:36,borderRadius:10,background:C.card,border:`1px solid ${C.border}`,color:C.text,cursor:"pointer",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>←</button>
        <div style={{flex:1}}>
          <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:22,color:C.text,margin:0,fontWeight:700}}>Historique</h1>
          <div style={{fontSize:12,color:C.sub,fontFamily:"'DM Sans',sans-serif"}}>
            {(historique||[]).length} dégustation{(historique||[]).length!==1?"s":""} · {totalBtl} btl consommée{totalBtl!==1?"s":""}
            {avgNote&&` · ★ ${avgNote}/5`}
          </div>
        </div>
      </div>

      <div style={{padding:"0 16px"}}>
        {/* Recherche */}
        <div style={{position:"relative",marginBottom:10}}>
          <span style={{position:"absolute",left:13,top:"50%",transform:"translateY(-50%)",color:C.sub2,fontSize:14}}>🔍</span>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Rechercher dans l'historique…"
            style={{width:"100%",background:C.card,border:`1px solid ${C.border}`,borderRadius:12,
              padding:"9px 14px 9px 36px",color:C.text,fontSize:13,fontFamily:"'DM Sans',sans-serif",outline:"none",boxSizing:"border-box"}}/>
        </div>

        {/* Filtres */}
        <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
          {[["date","📅 Date"],["note","★ Note"],["region","🗺 Région"]].map(([v,l])=>(
            <button key={v} onClick={()=>setSortBy(v)} style={{...pill(sortBy===v,"#8e44ad"),fontSize:12,padding:"5px 11px"}}>{l}</button>
          ))}
          <div style={{display:"flex",gap:4,alignItems:"center",marginLeft:"auto"}}>
            <span style={{fontSize:11,color:C.sub2}}>Min ★</span>
            {[0,3,4,5].map(n=>(
              <button key={n} onClick={()=>setFilterNote(n)} style={{
                padding:"5px 9px",borderRadius:8,fontSize:11,fontWeight:600,
                border:`1px solid ${filterNote===n?"#f39c12":C.border}`,
                background:filterNote===n?"#f39c1222":"transparent",
                color:filterNote===n?"#f39c12":C.sub,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",
              }}>{n===0?"Tous":n+"+"}</button>
            ))}
          </div>
        </div>

        {sorted.length===0?(
          <div style={{textAlign:"center",padding:"60px 0",color:C.sub2}}>
            <div style={{fontSize:48,marginBottom:14}}>📖</div>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,color:C.sub,marginBottom:6}}>
              {(historique||[]).length===0?"Aucune consommation":"Aucun résultat"}
            </div>
          </div>
        ):(
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {sorted.map(h=>(
              <div key={h.id} style={{background:C.card,borderRadius:14,padding:"14px 16px",border:`1px solid ${C.border}`}}>
                <div style={{display:"flex",alignItems:"flex-start",gap:12}}>
                  <div style={{width:40,height:40,borderRadius:12,background:TYPE_COLOR[h.type]+"18",border:`1px solid ${TYPE_COLOR[h.type]}30`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                    <Dot type={h.type} size={14}/>
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:2}}>
                      <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:15,fontWeight:700,color:C.text,flex:1,minWidth:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{h.nomVin}</div>
                      <div style={{fontSize:11,color:C.sub2,fontFamily:"'DM Sans',sans-serif",flexShrink:0,marginLeft:8}}>{h.date}</div>
                    </div>
                    {h.domaine&&<div style={{fontSize:12,color:C.sub,fontStyle:"italic",marginBottom:2}}>{h.domaine}</div>}
                    <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap",marginBottom:h.note||h.commentaire?8:0}}>
                      <span style={{fontSize:11,color:C.sub2}}>{h.region}</span>
                      {h.millesime&&<span style={{fontSize:11,color:C.sub2}}>· {h.millesime}</span>}
                      <span style={{background:"#c0392b22",border:"1px solid #c0392b33",borderRadius:6,padding:"1px 8px",fontSize:11,fontWeight:700,color:"#e74c3c",fontFamily:"'DM Sans',sans-serif"}}>{h.qte} btl</span>
                    </div>
                    {h.note>0&&<div style={{marginBottom:h.commentaire?6:0}}><Etoiles note={h.note}/></div>}
                    {h.commentaire&&<div style={{fontSize:12,color:C.sub,fontFamily:"'DM Sans',sans-serif",fontStyle:"italic",lineHeight:1.5}}>"{h.commentaire}"</div>}
                  </div>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// ── Toast ──────────────────────────────────────────────────────────────────────
function Toast({msg}){
  if(!msg) return null;
  return (
    <div style={{position:"fixed",bottom:90,left:"50%",transform:"translateX(-50%)",
      background:"#1a1a24",border:"1px solid #333",borderRadius:12,
      padding:"12px 20px",color:C.text,fontFamily:"'DM Sans',sans-serif",
      fontSize:14,fontWeight:500,zIndex:400,
      boxShadow:"0 8px 32px rgba(0,0,0,0.6)",whiteSpace:"nowrap",
      display:"flex",alignItems:"center",gap:8,
    }}>{msg}</div>
  );
}

const uid2=uid;
export default function App(){
  const [state,setState]=useState(loadState);
  const [page,setPage]=useState("dashboard");
  const [vinSel,setVinSel]=useState(null);
  const [editVin,setEditVin]=useState(null);
  const [toast,setToast]=useState(null);
  const [showLieux,setShowLieux]=useState(false);
  const [showRegions,setShowRegions]=useState(false);
  const [showRacks,setShowRacks]=useState(false);

  const {groupes,bouteilles,regions,historique=[]}=state;
  useEffect(()=>{try{localStorage.setItem(STORE,JSON.stringify(state));}catch{}},[state]);

  const toast_=msg=>{setToast(msg);setTimeout(()=>setToast(null),2600);};
  const mut=fn=>setState(fn);

  const addGroupe=nom=>{mut(s=>({...s,groupes:[...s.groupes,{id:uid2(),nom,racks:[]}]}));toast_(`🏠 "${nom}" ajouté`);};
  const renameGroupe=(id,nom)=>{mut(s=>({...s,groupes:s.groupes.map(g=>g.id===id?{...g,nom}:g)}));toast_("Lieu renommé ✓");};
  const deleteGroupe=id=>{
    if(bouteilles.some(b=>b.groupeId===id)){toast_("⚠ Déplacez d'abord les bouteilles");return;}
    mut(s=>({...s,groupes:s.groupes.filter(g=>g.id!==id)}));toast_("Lieu supprimé");
  };

  // Racks
  const saveRacks=(groupeId, racks)=>{
    mut(s=>({...s,groupes:s.groupes.map(g=>g.id===groupeId?{...g,racks}:g)}));
    toast_(`✓ ${racks.length} rack${racks.length!==1?"s":""} configuré${racks.length!==1?"s":""}`);
    setShowRacks(false);
  };

  // Régions
  const addRegion=nom=>{
    if(regions.includes(nom)){toast_("Cette région existe déjà");return;}
    mut(s=>({...s,regions:[...s.regions,nom]}));toast_(`🗺 "${nom}" ajoutée`);
  };
  const renameRegion=(idx,nom)=>{
    if(regions.includes(nom)&&regions[idx]!==nom){toast_("Cette région existe déjà");return;}
    const ancien=regions[idx];
    mut(s=>({...s,regions:s.regions.map((r,i)=>i===idx?nom:r),bouteilles:s.bouteilles.map(b=>b.region===ancien?{...b,region:nom}:b)}));
    toast_("Région renommée ✓");
  };
  const deleteRegion=idx=>{
    const nom=regions[idx];
    if(bouteilles.some(b=>b.region===nom)){toast_(`⚠ "${nom}" est utilisée`);return;}
    mut(s=>({...s,regions:s.regions.filter((_,i)=>i!==idx)}));toast_("Région supprimée");
  };

  const saveVin=f=>{
    if(f.id){mut(s=>({...s,bouteilles:s.bouteilles.map(b=>b.id===f.id?{...f}:b)}));toast_("✓ Bouteille modifiée");}
    else{mut(s=>({...s,bouteilles:[...s.bouteilles,{...f,id:uid2()}]}));toast_("🍾 Bouteille ajoutée !");}
    setEditVin(null);setPage("cave");
  };
  const deleteVin=id=>{
    mut(s=>({...s,bouteilles:s.bouteilles.filter(b=>b.id!==id)}));
    setVinSel(null);toast_("Bouteille supprimée");
  };
  const consommerVin=(b, qte, slotsConsommes=[], noteC=0, commentaireC="")=>{
    const n=Math.max(0,b.quantite-qte);
    const ancienSlots = Array.isArray(b.rackSlots)?b.rackSlots:(b.rackSlot?[b.rackSlot]:[]);
    const nouveauxSlots = ancienSlots.filter(s=>!slotsConsommes.includes(s));
    const entree = {id:uid2(),vinId:b.id,nomVin:b.nom,domaine:b.domaine||"",type:b.type,region:b.region,millesime:b.millesime||null,qte,date:new Date().toLocaleDateString("fr-FR"),note:noteC,commentaire:commentaireC};
    if(n===0){
      mut(s=>({...s,bouteilles:s.bouteilles.filter(x=>x.id!==b.id),historique:[...(s.historique||[]),entree]}));
      setVinSel(null);toast_(`🍷 Dernière bouteille — "${b.nom}" retiré de la cave`);
    } else {
      mut(s=>({...s,bouteilles:s.bouteilles.map(x=>x.id===b.id?{...x,quantite:n,rackSlots:nouveauxSlots}:x),historique:[...(s.historique||[]),entree]}));
      setVinSel(v=>v?{...v,quantite:n,rackSlots:nouveauxSlots}:null);
      toast_(`🍷 À votre santé ! Reste ${n} btl`);
    }
  };
  const saveNote=(vinId, note, commentaire)=>{
    mut(s=>({...s,bouteilles:s.bouteilles.map(b=>b.id===vinId?{...b,note,commentaire}:b)}));
    setVinSel(v=>v?{...v,note,commentaire}:null);
    toast_("Note enregistrée ✓");
  };

  const [filterRegionDash, setFilterRegionDash] = useState(null);

  const handleRegionClick = r => {
    setFilterRegionDash(r);
    setPage("cave");
  };

  const handleNav=p=>{
    if(p==="ajouter"){setEditVin(null);setPage("form");return;}
    setEditVin(null);
    setPage(p);
  };

  const showForm = page==="form"||editVin!=null;

  return (
    <>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600;700&display=swap');
        *{box-sizing:border-box;margin:0;padding:0;}
        body{background:${C.bg};color:${C.text};}
        ::-webkit-scrollbar{display:none;}
        select option{background:${C.card2};}
        input::placeholder{color:${C.sub2};}
        textarea::placeholder{color:${C.sub2};}
        @keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.6;transform:scale(1.2);}}
        @keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
      `}</style>

      <div style={{background:C.bg,minHeight:"100vh",maxWidth:480,margin:"0 auto",position:"relative",overflowX:"hidden"}}>

        {page==="dashboard"&&!showForm&&(
          <PageDashboard bouteilles={bouteilles} groupes={groupes} regions={regions}
            onGererLieux={()=>setShowLieux(true)}
            onGererRegions={()=>setShowRegions(true)}
            onGererRacks={()=>setShowRacks(true)}
            onVueRack={()=>setPage("rack")}
            onSuggestions={()=>setPage("suggestions")}
            onRegionClick={handleRegionClick}/>
        )}
        {page==="cave"&&!showForm&&!editVin&&(
          <PageCave bouteilles={bouteilles} groupes={groupes} regions={regions}
            initialRegion={filterRegionDash}
            onFilterConsumed={()=>setFilterRegionDash(null)}
            onVinClick={v=>setVinSel(v)}/>
        )}
        {page==="consommer"&&!showForm&&(
          <PageConsommer bouteilles={bouteilles} groupes={groupes}
            onConsommer={consommerVin}
            onBack={()=>setPage("dashboard")}/>
        )}
        {page==="historique"&&!showForm&&(
          <PageHistorique historique={historique} onBack={()=>setPage("dashboard")}/>
        )}
        {page==="rack"&&!showForm&&(
          <PageRackVue groupes={groupes} bouteilles={bouteilles}
            onVinClick={v=>setVinSel(v)}
            onBack={()=>setPage("dashboard")}/>
        )}
        {page==="suggestions"&&!showForm&&(
          <PageSuggestions bouteilles={bouteilles}
            onVinClick={v=>setVinSel(v)}
            onBack={()=>setPage("dashboard")}/>
        )}
        {showForm&&(
          <PageForm initial={editVin} groupes={groupes} regions={regions} bouteilles={bouteilles}
            onSave={saveVin}
            onBack={()=>{setEditVin(null);setPage(editVin?"cave":"dashboard");}}/>
        )}

        {!showForm&&page!=="consommer"&&(
          <BottomNav page={page} onNav={handleNav}/>
        )}

        {/* Supprimer le div vide */}

        {vinSel&&(
          <FicheVin
            vin={vinSel} groupes={groupes} bouteilles={bouteilles} historique={historique}
            onClose={()=>setVinSel(null)}
            onConsommer={b=>consommerVin(b,1)}
            onDelete={id=>deleteVin(id)}
            onEdit={v=>{setVinSel(null);setEditVin(v);setPage("form");}}
            onSaveNote={saveNote}/>
        )}

        {showLieux&&<ModalLieux groupes={groupes} bouteilles={bouteilles}
          onAdd={addGroupe} onRename={renameGroupe} onDelete={deleteGroupe}
          onClose={()=>setShowLieux(false)}/>}
        {showRegions&&<ModalRegions regions={regions} bouteilles={bouteilles}
          onAdd={addRegion} onRename={renameRegion} onDelete={deleteRegion}
          onClose={()=>setShowRegions(false)}/>}
        {showRacks&&<ModalRacks groupes={groupes} bouteilles={bouteilles}
          onSave={saveRacks} onClose={()=>setShowRacks(false)}/>}

        <Toast msg={toast}/>
      </div>
    </>
  );
}


    // Monter l'application
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
  </script>

  <!-- Service Worker pour fonctionnement hors-ligne -->
  <script>
    if('serviceWorker' in navigator) {
      const swCode = `
        const CACHE = 'cave-v1';
        const ASSETS = [location.href];
        self.addEventListener('install', e => {
          e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS)));
          self.skipWaiting();
        });
        self.addEventListener('fetch', e => {
          e.respondWith(
            caches.match(e.request).then(r => r || fetch(e.request))
          );
        });
      `;
      const blob = new Blob([swCode], {type:'application/javascript'});
      const url  = URL.createObjectURL(blob);
      navigator.serviceWorker.register(url).catch(()=>{});
    }
  </script>
</body>
</html>
